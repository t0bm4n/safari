<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, shrink-to-fit=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0d1117">
<title>Tier-Merge Safari</title>
<style>
  * { 
    margin: 0; 
    padding: 0; 
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }

  html, body {
    width: 100%;
    height: 100%;
    position: fixed;
    overflow: hidden;
    touch-action: none;
    overscroll-behavior: none;
    -webkit-user-select: none;
    user-select: none;
    -webkit-touch-callout: none;
  }

  body {
    background: #082b18;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  #dynamic-bg {
    position: fixed;
    inset: -20%;
    z-index: -1;
    transition: background 1.2s ease;
    filter: blur(100px);
    opacity: 0.5;
    animation: bgPulse 15s ease-in-out infinite;
    background-size: 200% 200%;
  }

  @keyframes bgPulse {
    0%, 100% { 
      transform: scale(1) rotate(0deg);
      opacity: 0.5;
      background-position: 0% 50%;
    }
    25% { background-position: 100% 50%; }
    50% { 
      transform: scale(1.1) rotate(5deg);
      opacity: 0.65;
      background-position: 100% 100%;
    }
    75% { background-position: 0% 100%; }
  }

  #game-wrapper {
    width: 100vw;
    height: 100vh;
    max-width: 480px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: min(2vw, 10px);
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }

  #hud {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    width: min(100vw - 20px, 420px);
    padding: min(2vw, 8px) min(3.3vw, 14px);
    background: rgba(255,255,255,0.07);
    border-radius: min(3.3vw, 14px);
    border: 1px solid rgba(255,255,255,0.1);
    color: #fff;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
  }

  #next-box {
    display: flex;
    flex-direction: row;
    align-items: center;
    gap: min(2vw, 8px);
    justify-content: flex-start;
  }

  #preview-canvas {
    width: min(11.4vw, 48px);
    height: min(11.4vw, 48px);
  }

  #next-label { 
    font-size: min(2.4vw, 10px); 
    opacity: 0.5; 
    text-transform: uppercase; 
    letter-spacing: 1px; 
    white-space: nowrap;
  }

  #score-box {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    justify-content: flex-end;
  }

  #score-label { 
    font-size: min(2.4vw, 10px); 
    opacity: 0.5; 
    text-transform: uppercase; 
    letter-spacing: 1px; 
  }

  #score-val { 
    color: #ffd700; 
    font-size: min(4.8vw, 20px); 
    font-weight: 700; 
    line-height: 1; 
  }

  #gear-btn {
    width: min(8.1vw, 34px);
    height: min(8.1vw, 34px);
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.14);
    border-radius: 50%;
    cursor: pointer;
    font-size: min(4vw, 17px);
    transition: all 0.18s;
    user-select: none;
    justify-self: center;
    touch-action: manipulation;
  }

  #gear-btn:active { 
    background: rgba(255,255,255,0.18); 
    transform: scale(0.95) rotate(30deg); 
  }

  #phaser-container {
    position: relative;
    width: min(100vw - 20px, 420px);
    height: auto;
    aspect-ratio: 420 / 580;
  }

  #phaser-container canvas {
    width: 100% !important;
    height: 100% !important;
    border-radius: min(3.8vw, 16px);
    display: block;
    box-shadow: 0 24px 64px rgba(0,0,0,0.6);
    touch-action: none;
    border: 2px solid rgba(255,255,255,0.15);
    image-rendering: -webkit-optimize-contrast;
    image-rendering: crisp-edges;
    -webkit-font-smoothing: antialiased;
  }

  #menu-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    z-index: 100;
    align-items: center;
    justify-content: center;
    animation: fadeIn 0.2s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  #menu-overlay.open { display: flex; }

  #menu-panel {
    background: rgba(13, 17, 23, 0.98);
    border: 1px solid rgba(255,255,255,0.14);
    border-radius: min(4.3vw, 18px);
    padding: min(6.7vw, 28px) min(7.6vw, 32px);
    display: flex;
    flex-direction: column;
    gap: min(3.3vw, 14px);
    min-width: min(80vw, 320px);
    color: #fff;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    animation: slideUp 0.3s ease;
  }

  @keyframes slideUp {
    from { 
      opacity: 0;
      transform: translateY(20px) scale(0.95);
    }
    to { 
      opacity: 1;
      transform: translateY(0) scale(1);
    }
  }

  #menu-panel h2 {
    font-size: min(3.8vw, 16px);
    font-weight: 600;
    opacity: 0.6;
    text-align: center;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: min(1vw, 4px);
  }

  .menu-btn {
    padding: min(2.6vw, 11px) min(4.8vw, 20px);
    border: 1px solid rgba(255,255,255,0.16);
    background: rgba(255,255,255,0.07);
    color: #fff;
    border-radius: min(2.4vw, 10px);
    cursor: pointer;
    font-size: min(3.6vw, 15px);
    transition: all 0.16s;
    text-align: left;
    display: flex;
    align-items: center;
    gap: min(2.4vw, 10px);
    touch-action: manipulation;
    min-height: 44px;
  }

  .menu-btn:active { 
    background: rgba(255,255,255,0.15); 
    transform: scale(0.98);
  }



  .cat-section-label {
    font-size: min(2.6vw, 11px);
    opacity: 0.45;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: -4px;
  }

  .cat-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: min(1.4vw, 6px);
  }

  .cat-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    padding: min(1.9vw, 8px) min(1vw, 4px);
    border-radius: min(2vw, 8px);
    border: 1.5px solid rgba(255,255,255,0.12);
    background: rgba(255,255,255,0.06);
    cursor: pointer;
    transition: all 0.15s;
    touch-action: manipulation;
    min-height: 54px;
  }

  .cat-btn.active {
    border-color: rgba(255,220,80,0.8);
    background: rgba(255,220,80,0.14);
    box-shadow: 0 0 10px rgba(255,220,80,0.2);
  }

  .cat-btn:active { transform: scale(0.94); }

  .cat-btn .cat-icon { font-size: min(5.7vw, 22px); line-height: 1; }

  .cat-btn .cat-label {
    font-size: min(2vw, 8px);
    opacity: 0.65;
    text-align: center;
    line-height: 1.1;
    color: #fff;
  }

  .cat-btn.active .cat-label { opacity: 1; color: #ffd700; }

  #merge-bar {
    width: min(100vw - 20px, 420px);
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: min(3.3vw, 14px);
    padding: min(1.9vw, 8px) min(2.4vw, 10px);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: min(0.7vw, 3px);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
  }

  .merge-cell {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: min(0.7vw, 3px);
    position: relative;
    transition: transform 0.2s;
  }

  .merge-cell canvas {
    border-radius: 50%;
    transition: box-shadow 0.15s, transform 0.3s;
    display: block;
    width: 100%;
    height: auto;
  }

  .merge-cell.just-merged canvas {
    transform: scale(1.18);
    /* box-shadow wird per JS in der Tier-Farbe gesetzt, kein Override hier */
  }

  .merge-arrow {
    position: absolute;
    right: -3px;
    top: 50%;
    transform: translateY(-50%);
    font-size: min(1.9vw, 8px);
    color: rgba(255,255,255,0.25);
    z-index: 1;
    pointer-events: none;
  }

  .merge-cell:last-child .merge-arrow { display: none; }

  #loading-screen {
    position: fixed;
    inset: 0;
    background: linear-gradient(135deg, #082b18 0%, #0d5c2e 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    transition: opacity 0.5s ease, visibility 0.5s ease;
  }

  #loading-screen.hidden {
    opacity: 0;
    visibility: hidden;
  }

  .loading-emoji {
    font-size: min(15vw, 64px);
    animation: bounce 1s infinite;
  }

  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-20px); }
  }

  .loading-text {
    color: #fff;
    font-size: min(4.3vw, 18px);
    margin-top: min(4.8vw, 20px);
    opacity: 0.7;
  }

  @media (max-width: 375px) {
    #game-wrapper { gap: 8px; }
  }

  @media (min-width: 481px) {
    #hud, #phaser-container, #merge-bar { width: 420px; }
  }

  @media (orientation: landscape) and (max-height: 500px) {
    #game-wrapper { gap: 5px; }
    #hud { padding: 6px 12px; }
    #merge-bar { padding: 6px 8px; }
  }
</style>
</head>
<body>

<div id="dynamic-bg"></div>

<div id="start-screen" style="
  position:fixed;
  inset:0;
  background:rgba(8,43,24,0.90);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  z-index:2000;
  color:white;
  font-family:system-ui;
  text-align:center;
  gap: 18px;
  padding: 24px;
">
  <div style="font-size:52px; line-height:1;">🐘</div>
  <div style="font-size:22px; font-weight:700; letter-spacing:0.5px;">Tier-Merge Safari</div>

  <div style="width:100%; max-width:340px;">
    <div style="font-size:11px; opacity:0.45; text-transform:uppercase; letter-spacing:1px; margin-bottom:10px;">Wähle deine Kategorie</div>
    <div id="start-cat-grid" style="display:grid; grid-template-columns:repeat(4,1fr); gap:7px;"></div>
  </div>

  <div id="start-btn" style="
    margin-top:6px;
    background: rgba(255,255,255,0.12);
    border: 1.5px solid rgba(255,255,255,0.25);
    border-radius: 14px;
    padding: 13px 38px;
    font-size: 17px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.3px;
    touch-action: manipulation;
  ">Tippe zum Starten ▶</div>

  <div id="version-display" style="font-size:11px; opacity:0.35;"></div>
</div>

<div id="loading-screen">
  <div class="loading-emoji">🐘</div>
  <div class="loading-text">Lade Safari...</div>
</div>

<div id="game-wrapper">
  <div id="hud">
    <div id="next-box">
      <canvas id="preview-canvas" width="48" height="48"></canvas>
      <div id="next-label">Nächstes</div>
    </div>
    <div id="gear-btn" title="Einstellungen">⚙️</div>
    <div id="score-box">
      <div id="score-label">Punkte</div>
      <span id="score-val">0</span>
    </div>
  </div>

  <div id="phaser-container"></div>

  <div id="menu-overlay">
    <div id="menu-panel">
      <h2>Menü</h2>
      <button class="menu-btn" id="menu-restart">🔄&nbsp; Neu starten</button>
      <button class="menu-btn" id="menu-mute">🔊&nbsp; Sound an</button>
      <div class="cat-section-label">Emoji-Kategorie</div>
      <div id="menu-cat-grid" class="cat-grid"></div>
      <button class="menu-btn" id="menu-close" style="justify-content:center; opacity:0.7;">✕&nbsp; Schließen</button>
    </div>
  </div>

  <div id="merge-bar"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.60.0/phaser.min.js"></script>

<script>
// ========================================
// VERSIONSNUMMER
// ========================================
const VERSION = "0.0.4";

// ========================================
// SOUND-KONFIGURATION
// ========================================
const SOUND_FOLDER = "./sounds/";

const SOUND_FILES = {
  bgMusic:     SOUND_FOLDER + "loop_1.mp3",
  drop:        SOUND_FOLDER + "drop.mp3",
  merge:       SOUND_FOLDER + "merge.mp3",
  fanfare:     SOUND_FOLDER + "fanfare.mp3",
  elephantWin: SOUND_FOLDER + "elephant.mp3",
};

// Auf true setzen, um die eingebauten Synth-Sounds zu nutzen (ohne Dateien)
const USE_DEFAULT_SOUNDS = false;

// ========================================
// NINTENDO SUPER AUDIO ENGINE 🎮
// ========================================
let muted = false;
let audioCtx = null;

// Loop-Playback State
let _bgLoopSource  = null;
let _bgLoopBuffer  = null;

// Audio-Buffer-Cache
const _audioBuffers = {};

function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

async function _loadAudioBuffer(key, url) {
  if (_audioBuffers[key]) return _audioBuffers[key];
  try {
    const resp = await fetch(url);
    if (!resp.ok) throw new Error('not found');
    const arr  = await resp.arrayBuffer();
    const ctx  = getAudioCtx();
    _audioBuffers[key] = await ctx.decodeAudioData(arr);
    return _audioBuffers[key];
  } catch (e) {
    console.warn(`Sound-Datei "${url}" nicht gefunden, nutze Synth-Fallback.`);
    return null;
  }
}

function _playBuffer(buffer, vol = 0.8) {
  if (!buffer || muted) return;
  try {
    const ctx  = getAudioCtx();
    const src  = ctx.createBufferSource();
    const gain = ctx.createGain();
    src.buffer       = buffer;
    gain.gain.value  = vol;
    src.connect(gain);
    gain.connect(ctx.destination);
    src.start(0);
  } catch (_) {}
}

// ─── Nintendo-Style Pulswellen-Oszillator ───────────────────────────────────
// Erzeugt einen echten Rechteck-/Pulswellen-Sound wie ein Game-Boy
function _createPulseOsc(ctx, freq, duty = 0.5) {
  // Durch Überlagerung zweier Sägezahn-Wellen → Pulswelle
  const real = new Float32Array(32);
  const imag = new Float32Array(32);
  for (let n = 1; n < 32; n++) {
    // Rechteckwelle mit duty cycle: Fourier-Koeffizienten
    imag[n] = (2 / (n * Math.PI)) * Math.sin(n * Math.PI * duty);
  }
  const wave = ctx.createPeriodicWave(real, imag, { disableNormalization: false });
  const osc  = ctx.createOscillator();
  osc.setPeriodicWave(wave);
  osc.frequency.value = freq;
  return osc;
}

// Einfacher Ton (mit optionalem Vibrato für Nintendo-Feel)
function playTone(freq, type = 'square', duration = 0.2, vol = 0.15, endFreq = null, vibrato = false) {
  if (muted) return;
  try {
    const ctx  = getAudioCtx();
    let osc;
    if (type === 'pulse25') {
      osc = _createPulseOsc(ctx, freq, 0.25);
    } else if (type === 'pulse50' || type === 'square') {
      osc = _createPulseOsc(ctx, freq, 0.5);
    } else {
      osc = ctx.createOscillator();
      osc.type = type;
      osc.frequency.value = freq;
    }

    const gain = ctx.createGain();
    const t    = ctx.currentTime;

    // Vibrato (Nintendo-typisch: leichtes Frequenz-Zittern)
    if (vibrato) {
      const lfo = ctx.createOscillator();
      lfo.frequency.value = 6;
      const lfoGain = ctx.createGain();
      lfoGain.gain.value = freq * 0.012;
      lfo.connect(lfoGain);
      lfoGain.connect(osc.frequency);
      lfo.start(t);
      lfo.stop(t + duration);
    }

    if (endFreq) {
      osc.frequency.setValueAtTime(freq, t);
      osc.frequency.exponentialRampToValueAtTime(endFreq, t + duration);
    }

    // NES-typische Attack/Decay-Hüllkurve
    gain.gain.setValueAtTime(0, t);
    gain.gain.linearRampToValueAtTime(vol, t + 0.012);
    gain.gain.setValueAtTime(vol, t + duration * 0.4);
    gain.gain.exponentialRampToValueAtTime(0.001, t + duration);

    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start(t);
    osc.stop(t + duration + 0.05);
  } catch (_) {}
}

// ─── Hintergrundmusik: Loop-Datei ODER Synth-Sequencer ──────────────────────

// Sequencer-State
let _seqRunning    = false;
let _seqHandle     = null;
let _seqStep       = 0;
let _seqBiome      = 0;

// Biome-Melodien (8-Step-Patterns, null = Pause)
const BIOME_MELODIES = [
  // 0: Savanne – entspannt, Dur
  [262, null, 330, 392, null, 330, 262, null],
  // 1: Wüste – lebhafter, kleine Terzen
  [330, 392, 440, null, 392, 330, null, 294],
  // 2: Ozean – ruhig, schwebend
  [196, null, 247, null, 294, null, 247, null],
  // 3: Vulkan – schnell, dramatisch
  [392, 440, 494, 523, 440, 392, 330, null],
  // 4: Eis – leise, Moll
  [220, null, 262, null, 220, null, 196, null],
  // 5: Blüten – verspielt, Quarten
  [349, 392, null, 440, null, 392, 349, 330],
  // 6: Kosmos – langsam, Quinten
  [196, null, null, 294, null, null, 392, null],
];

// Bass-Patterns (ein Ton pro 4 Steps)
const BIOME_BASS = [
  [98,  null, null, null, 98,  null, null, null],
  [110, null, null, null, 130, null, null, null],
  [82,  null, null, null, 82,  null, null, null],
  [130, null, null, null, 110, null, null, null],
  [82,  null, null, null, 73,  null, null, null],
  [117, null, null, null, 117, null, null, null],
  [65,  null, null, null, null,null, null, null],
];

// Kick/Snare Pattern (1 = kick, 2 = snare)
const DRUM_PATTERN = [1, 0, 0, 2, 1, 0, 1, 2];

const BIOME_TEMPOS = [420, 320, 550, 240, 650, 380, 750]; // ms pro Step

function _seqTick() {
  if (!_seqRunning || muted) return;
  const ctx   = getAudioCtx();
  const now   = ctx.currentTime;
  const step  = _seqStep % 8;
  const mel   = BIOME_MELODIES[_seqBiome];
  const bass  = BIOME_BASS[_seqBiome];
  const tempo = BIOME_TEMPOS[_seqBiome];

  // Melodie-Stimme (Pulswelle 25%)
  if (mel[step]) {
    const f = mel[step];
    _schedNote(ctx, now, f, 'pulse25', tempo * 0.0007, 0.13, false);
    // Zweite Stimme eine Terz tiefer, sehr leise
    if (step % 4 === 0) _schedNote(ctx, now, f * 0.75, 'triangle', tempo * 0.001, 0.05, false);
  }

  // Bass (Dreick-Welle, eine Oktave tiefer)
  if (bass[step]) {
    _schedNote(ctx, now, bass[step], 'triangle', tempo * 0.0014, 0.18, false);
  }

  // Drums
  const drum = DRUM_PATTERN[step];
  if (drum === 1) _kick(ctx, now);
  if (drum === 2) _snare(ctx, now);

  _seqStep++;
  _seqHandle = setTimeout(_seqTick, tempo);
}

function _schedNote(ctx, time, freq, type, dur, vol, vib) {
  if (muted) return;
  try {
    let osc;
    if (type === 'pulse25') osc = _createPulseOsc(ctx, freq, 0.25);
    else if (type === 'pulse50') osc = _createPulseOsc(ctx, freq, 0.5);
    else { osc = ctx.createOscillator(); osc.type = type; osc.frequency.value = freq; }
    const gain = ctx.createGain();
    gain.gain.setValueAtTime(0, time);
    gain.gain.linearRampToValueAtTime(vol, time + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.001, time + dur);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(time); osc.stop(time + dur + 0.02);
  } catch(_) {}
}

function _kick(ctx, time) {
  try {
    const osc  = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.frequency.setValueAtTime(120, time);
    osc.frequency.exponentialRampToValueAtTime(45, time + 0.12);
    gain.gain.setValueAtTime(0.28, time);
    gain.gain.exponentialRampToValueAtTime(0.001, time + 0.18);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(time); osc.stop(time + 0.2);
  } catch(_) {}
}

function _snare(ctx, time) {
  try {
    // Weißes Rauschen – kleiner Buffer, einmalig erstellt und wiederverwendet
    if (!_snare._buf) {
      const buf  = ctx.createBuffer(1, Math.floor(ctx.sampleRate * 0.06), ctx.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
      _snare._buf = buf;
    }
    const src  = ctx.createBufferSource();
    src.buffer = _snare._buf;
    const gain = ctx.createGain();
    gain.gain.setValueAtTime(0.18, time);
    gain.gain.exponentialRampToValueAtTime(0.001, time + 0.1);
    src.connect(gain); gain.connect(ctx.destination);
    src.start(time); src.stop(time + 0.12);
  } catch(_) {}
}

// Wird von updateScore() aufgerufen – wechselt Tempo & Melodie je nach Biome
function updateMusicBiome(biomeIdx) {
  if (_seqBiome === biomeIdx) return;
  _seqBiome = biomeIdx;
  // Snare-Buffer zurücksetzen (neuer AudioContext-Rate könnte abweichen)
  _snare._buf = null;
}

async function startBgMusic() {
  if (muted) return;
  if (_bgLoopSource || _seqRunning) return;

  // Versuche zuerst die Loop-Datei zu laden
  const buf = await _loadAudioBuffer('bgMusic', SOUND_FILES.bgMusic);
  if (buf && !muted) {
    _bgLoopBuffer = buf;
    _startLoopSource();
    return;
  }
  // Fallback: Sequencer
  _seqRunning = true;
  _seqStep    = 0;
  _seqTick();
}

function _startLoopSource() {
  if (!_bgLoopBuffer || muted) return;
  try {
    const ctx  = getAudioCtx();
    const src  = ctx.createBufferSource();
    const gain = ctx.createGain();
    src.buffer = _bgLoopBuffer;
    src.loop   = true;
    gain.gain.value = 0.55;
    src.connect(gain);
    gain.connect(ctx.destination);
    src.start(0);
    _bgLoopSource = src;
  } catch (_) {}
}

function stopBgMusic() {
  if (_bgLoopSource) {
    try { _bgLoopSource.stop(); } catch (_) {}
    _bgLoopSource = null;
  }
  if (_seqHandle) { clearTimeout(_seqHandle); _seqHandle = null; }
  _seqRunning = false;
}

// ─── Drop-Sound: Nintendo-Style Pitchfall ────────────────────────────────────
function playDropSound() {
  if (USE_DEFAULT_SOUNDS) {
    // Kurzer NES-Pitchfall (square → triangle)
    playTone(320, 'pulse50', 0.09, 0.18, 120);
    return;
  }
  _loadAudioBuffer('drop', SOUND_FILES.drop).then(buf => {
    if (buf) _playBuffer(buf, 0.5);
    else     playTone(320, 'pulse50', 0.09, 0.18, 120);
  });
}

// ─── Merge-Sound: Arpeggio-Akkord (wie Super Mario Münze) ────────────────────
function playMergeSound(level) {
  if (USE_DEFAULT_SOUNDS) {
    _niMerge(level);
    return;
  }
  _loadAudioBuffer('merge', SOUND_FILES.merge).then(buf => {
    if (buf) _playBuffer(buf, 0.7);
    else     _niMerge(level);
  });
}

function _niMerge(level) {
  // Klassischer Sweep (wie vorher, aber mit Pulswelle statt Sinus)
  playTone(280 + level * 90, 'pulse50', 0.28, 0.20, 500 + level * 80);
  // Zweite Stimme: leichter Dreiklang
  setTimeout(() => { if (!muted) playTone(400 + level * 60, 'triangle', 0.18, 0.12); }, 40);
  // Glöckchen für höhere Level
  if (level >= 3) {
    setTimeout(() => { if (!muted) playTone((600 + level * 80) * 2, 'triangle', 0.22, 0.07); }, 90);
  }
}

// ─── Fanfare: NES-Victory-Jingle ──────────────────────────────────────────────
function playFanfare() {
  if (muted) return;
  try {
    const ctx = getAudioCtx();
    // Melody (Super Mario-Style Aufwärtsläufe)
    const melody = [
      { f: 523,  t: 0.00 }, { f: 659,  t: 0.10 }, { f: 784,  t: 0.20 },
      { f: 1047, t: 0.30 }, { f: 1319, t: 0.45 }, { f: 1568, t: 0.60 },
      // Akkord am Ende
      { f: 523,  t: 0.88 }, { f: 659,  t: 0.88 }, { f: 784,  t: 0.88 }, { f: 1047, t: 0.88 },
    ];
    melody.forEach(({ f, t }) => {
      setTimeout(() => {
        if (!muted) playTone(f, 'pulse25', 0.35, 0.2);
      }, t * 1000);
    });
    // Bass-Drum-Ersatz mit weißem Rauschen
    [0, 0.10, 0.20, 0.30].forEach(t => {
      setTimeout(() => {
        if (muted) return;
        try {
          const bufSize = Math.floor(ctx.sampleRate * 0.05);
          const nb   = ctx.createBuffer(1, bufSize, ctx.sampleRate);
          const data = nb.getChannelData(0);
          for (let i = 0; i < bufSize; i++) data[i] = (Math.random() * 2 - 1) * 0.25;
          const nsrc = ctx.createBufferSource();
          nsrc.buffer = nb;
          const ng = ctx.createGain();
          ng.gain.setValueAtTime(0.3, ctx.currentTime);
          ng.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.05);
          nsrc.connect(ng);
          ng.connect(ctx.destination);
          nsrc.start();
        } catch (_) {}
      }, t * 1000);
    });
    // Sawtooth-Tröte am Ende
    setTimeout(() => {
      if (!muted) playTone(300, 'sawtooth', 0.8, 0.22, 900);
    }, 900);
  } catch (_) {}
}

// ─── Elefanten-Sound ─────────────────────────────────────────────────────────
function playElephantSound() {
  if (muted) return;
  try {
    const ctx = getAudioCtx();
    [
      { f: 180, t: 0.0,  dur: 0.3  },
      { f: 220, t: 0.3,  dur: 0.25 },
      { f: 380, t: 0.55, dur: 0.4  },
    ].forEach(({ f, t, dur }) => {
      setTimeout(() => {
        if (!muted) playTone(f, 'sawtooth', dur, 0.25, f * 1.5);
      }, t * 1000);
    });
  } catch (_) {}
}

function getBiomeIndex(score) {
  for (let i = BIOMES.length - 1; i >= 0; i--)
    if (score >= BIOMES[i].from) return i;
  return 0;
}

function hexToRgb(hex) {
  const n = parseInt(hex.replace('#',''), 16);
  return [(n >> 16) & 255, (n >> 8) & 255, n & 255];
}

function lerpHex(a, b, t) {
  const [ar, ag, ab] = hexToRgb(a);
  const [br, bg, bb] = hexToRgb(b);
  const lerp = (x, y) => Math.round(Math.max(0, Math.min(255, x + (y - x) * t)));
  return '#' + [lerp(ar, br), lerp(ag, bg), lerp(ab, bb)]
    .map(v => v.toString(16).padStart(2, '0')).join('');
}

function vibrate(duration = 10) {

  navigator.vibrate(duration);

function initMergeBar() {
  mergeBar.innerHTML = '';
  mergeCells.length = 0;

  const barWidth  = mergeBar.offsetWidth;
  const cellSize  = Math.floor((barWidth - 20 - 9 * 3) / 10);

  ANIMALS.forEach((a, i) => {
    const cell = document.createElement('div');
    cell.className = 'merge-cell';
    cell.id = 'mc-' + i;

    const cv    = document.createElement('canvas');
    cv.width    = cellSize;
    cv.height   = cellSize;

    const arrow = document.createElement('span');
    arrow.className = 'merge-arrow';

    cell.appendChild(cv);
    cell.appendChild(arrow);

    const ctx = cv.getContext('2d');
    mergeCells.push({ canvas: cv, ctx, cell, size: cellSize });
    drawMergeCell(i, cellSize, ctx);
  });
}

function drawMergeCell(i, size, ctx) {
  const a  = ANIMALS[i];
  const cx = size / 2;
  const cy = size / 2;
  const r  = size * 0.42;

  ctx.clearRect(0, 0, size, size);
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.fillStyle = '#' + a.color.toString(16).padStart(6, '0');
  ctx.fill();

  const fontSize = Math.round(r * 1.6);
  ctx.font = `${fontSize}px serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.shadowColor = 'rgba(0,0,0,0.5)';
  ctx.shadowBlur = 3;
  ctx.fillText(a.emoji, cx, cy + 1);
  ctx.shadowColor = 'transparent';
  ctx.shadowBlur = 0;
}

function flashMergeCell(i) {
  const { cell, canvas } = mergeCells[i];
  // Farbe des gemergten Tieres als Glow-Farbe nutzen
  const color = ANIMALS[i].color;
  const r = (color >> 16) & 0xff;
  const g = (color >> 8)  & 0xff;
  const b =  color        & 0xff;
  canvas.style.boxShadow = `0 0 12px 5px rgba(${r},${g},${b},0.95)`;
  canvas.style.transform = 'scale(1.18)';
  cell.classList.add('just-merged');
  if (flashTimers[i]) clearTimeout(flashTimers[i]);
  flashTimers[i] = setTimeout(() => {
    cell.classList.remove('just-merged');
    canvas.style.boxShadow = '';
    canvas.style.transform = '';
  }, 600);
}

// ========================================
// PHASER SCENE KLASSEN
// ========================================
class Background {
  constructor(scene) {
    this.off     = document.createElement('canvas');
    this.off.width  = W;
    this.off.height = H;
    this.ctx     = this.off.getContext('2d');
    this.tex     = scene.textures.createCanvas('bg', W, H);
    this.img     = scene.add.image(0, 0, 'bg').setOrigin(0, 0).setDepth(-10);
    this.time    = 0;
    this.sky0    = BIOMES[0].sky[0];
    this.sky1    = BIOMES[0].sky[1];
    this.hills   = BIOMES[0].hills;
    this.plants  = BIOMES[0].plants;
    this._frame  = 0;  // Frame-Zähler für Throttling
  }

  draw(score, delta) {
    const dt  = Math.min(delta, 50) / (1000 / 60);
    this.time += 0.004 * dt;
    this._frame++;

    const tgt = BIOMES[getBiomeIndex(score)];
    const spd = 0.012 * dt;
    this.sky0   = lerpHex(this.sky0,  tgt.sky[0],  spd);
    this.sky1   = lerpHex(this.sky1,  tgt.sky[1],  spd);
    this.hills  = lerpHex(this.hills, tgt.hills,   spd);
    this.plants = lerpHex(this.plants, tgt.plants, spd);
    tickBodyBackground(spd);

    // Hintergrund nur jeden 2. Frame neu zeichnen (spart ~30% GPU auf Mobile)
    if (this._frame % 2 !== 0) return;

    const ctx  = this.ctx;
    ctx.clearRect(0, 0, W, H);
    const grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, this.sky0);
    grad.addColorStop(0.55, lerpHex(this.sky0, this.sky1, 0.55));
    grad.addColorStop(1, this.sky1);
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);

    ctx.fillStyle = 'rgba(255,255,255,0.32)';
    for (let i = 0; i < 8; i++) {  // 12 → 8 Partikel
      const x = (i * 110 * SCALE_FACTOR + this.time * 28 * SCALE_FACTOR) % W;
      const y = 55 * SCALE_FACTOR + Math.sin(i * 1.4 + this.time * 1.1) * 28 * SCALE_FACTOR;
      ctx.beginPath();
      ctx.arc(x, y, 2.5 * SCALE_FACTOR, 0, Math.PI * 2);
      ctx.fill();
    }

    this._hill(ctx, 125 * SCALE_FACTOR, 0.65, this.hills,  0.88);
    this._hill(ctx, 82  * SCALE_FACTOR, 1.15, this.plants, 1.0);
    this.tex.getContext().drawImage(this.off, 0, 0);
    this.tex.refresh();
  }

  _hill(ctx, h, spd, color, alpha) {
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.moveTo(0, H);
    for (let x = 0; x <= W; x += 3 * SCALE_FACTOR) {
      const y = H - h
        + Math.sin(x * 0.017 / SCALE_FACTOR + this.time * spd) * 13 * SCALE_FACTOR
        + Math.sin(x * 0.007 / SCALE_FACTOR + this.time * spd * 0.4) * 7 * SCALE_FACTOR;
      ctx.lineTo(x, y);
    }
    ctx.lineTo(W, H);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }
}

class BallManager {
  constructor(scene) {
    this.scene = scene;
    this.balls = [];
  }

  drop(mouseX, type) {
    const a = ANIMALS[type];
    const x = Phaser.Math.Clamp(mouseX, a.r + 4 * SCALE_FACTOR, W - a.r - 4 * SCALE_FACTOR);
    const y = GAME_OVER_LINE - a.r - DROP_Y_OFFSET;
    playDropSound();
    vibrate(5);
    return this.spawn(x, y, type, 0.3);
  }

  spawn(x, y, type, scale = 0.6) {
    const a    = ANIMALS[type];
    const body = this.scene.matter.add.circle(x, y, a.r, {
      restitution:  0.18,
      friction:     0.5,
      frictionStatic: 0.5,
      density:      0.0012,
      frictionAir:  0.011 - (a.r / (98 * SCALE_FACTOR)) * 0.004,
      slop:         0.3 * SCALE_FACTOR,
    });
    body._type      = type;
    body._merged    = false;
    body._spawnTime = Date.now();

    const container = this.scene.add.container(x, y).setDepth(1);
    const circle    = this.scene.add.graphics();
    circle.fillStyle(a.color, 1);
    circle.fillCircle(0, 0, a.r);
    circle.fillStyle(0xffffff, 0.18);
    circle.fillCircle(-a.r * 0.22, -a.r * 0.28, a.r * 0.46);

    const label = this.scene.add.text(0, 1, a.emoji, {
      fontSize:   Math.floor(a.r * 1.4) + 'px',
      fontFamily: 'serif',
    }).setOrigin(0.5, 0.5);

    container.add([circle, label]).setScale(scale);
    this.balls.push({ body, container, _scale: scale });
    return body;
  }

  remove(matterBody) {
    const idx = this.balls.findIndex(b => b.body === matterBody);
    if (idx === -1) return;
    const b = this.balls[idx];
    b.container.destroy();
    try { this.scene.matter.world.remove(matterBody); } catch (_) {}
    this.balls.splice(idx, 1);
  }

  draw(delta) {
    const dt = Math.min(delta || 16, 50) / (1000 / 60);
    for (const b of this.balls) {
      if (!b.body) continue;
      b._scale = Math.min(1, b._scale + 0.05 * dt);
      b.container.setPosition(b.body.position.x, b.body.position.y);
      b.container.setScale(b._scale);
      b.container.setRotation(b.body.angle);
    }
  }

  clear() {
    for (const b of this.balls) {
      b.container.destroy();
      try { this.scene.matter.world.remove(b.body); } catch (_) {}
    }
    this.balls = [];
  }

  checkGameOver() {
    const now = Date.now();
    // Nach einem Merge: kurze globale Gnadenfrist für alle Bälle
    if (this._lastMergeTime && now - this._lastMergeTime < 1200) return false;
    for (const b of this.balls) {
      if (!b.body) continue;
      if (now - b.body._spawnTime < 2200) continue;
      const ballRadius = ANIMALS[b.body._type].r;
      const ballTop    = b.body.position.y - ballRadius;
      // Vollständig über der Gefahrenlinie und nahezu still
      if (ballTop < GAME_OVER_LINE && Math.hypot(b.body.velocity.x, b.body.velocity.y) < 0.8) return true;
    }
    return false;
  }
}

class EffectsManager {
  constructor(scene) {
    this.scene = scene;
  }

  spawnMerge(x, y, level) {
    const a = ANIMALS[Math.min(level, ANIMALS.length - 1)];
    const emitter = this.scene.add.particles(x, y, '__DEFAULT', {
      speed:    { min: (70 + level * 15) * SCALE_FACTOR, max: (180 + level * 25) * SCALE_FACTOR },
      angle:    { min: 0, max: 360 },
      scale:    { start: (0.7 + level * 0.07) * SCALE_FACTOR, end: 0 },
      alpha:    { start: 1, end: 0 },
      lifespan: 380 + level * 25,
      quantity: 14 + level * 2,
      tint:     [a.color, 0xffffff, 0xffffcc],
      emitting: false,
      depth:    5,
    });
    emitter.explode(14 + level * 2);
    this.scene.time.delayedCall(700, () => { if (emitter.active) emitter.destroy(); });

    const ring = this.scene.add.graphics().setDepth(5);
    ring.lineStyle(3 * SCALE_FACTOR, a.color, 0.95);
    ring.strokeCircle(0, 0, 12 * SCALE_FACTOR);
    ring.setPosition(x, y);
    this.scene.tweens.add({
      targets:  ring,
      scaleX:   4.5 + level * 0.55,
      scaleY:   4.5 + level * 0.55,
      alpha:    0,
      duration: 340 + level * 18,
      ease:     'Quad.easeOut',
      onComplete: () => ring.destroy(),
    });

    this.scene.cameras.main.shake(100 + level * 12, 0.004 + level * 0.0008);
    playMergeSound(level);
    vibrate(15 + level * 5);
  }

  spawnGameOverEffect(cx, cy) {
    const emitter = this.scene.add.particles(cx, cy, '__DEFAULT', {
      speed:    { min: 100 * SCALE_FACTOR, max: 220 * SCALE_FACTOR },
      angle:    { min: 0, max: 360 },
      scale:    { start: 1.2 * SCALE_FACTOR, end: 0 },
      alpha:    { start: 1, end: 0 },
      lifespan: 900,
      quantity: 50,
      tint:     [0xff4444, 0xff8800, 0xffff00, 0xffffff],
      emitting: false,
      depth:    20,
    });
    emitter.explode(50);
    this.scene.time.delayedCall(1100, () => { if (emitter.active) emitter.destroy(); });
    vibrate([100, 50, 100]);
  }

  spawnWinEffect(cx, cy) {
    const confetti = this.scene.add.particles(cx, 0, '__DEFAULT', {
      speedX:   { min: -120 * SCALE_FACTOR, max: 120 * SCALE_FACTOR },
      speedY:   { min: 80 * SCALE_FACTOR,   max: 260 * SCALE_FACTOR },
      scale:    { start: 0.9 * SCALE_FACTOR, end: 0.2 * SCALE_FACTOR },
      alpha:    { start: 1, end: 0 },
      lifespan: 1800,
      quantity: 4,
      tint:     [0xffd700, 0xff69b4, 0x00cfff, 0x7fff00, 0xff8c00, 0xda70d6],
      depth:    20,
      gravityY: 60 * SCALE_FACTOR,
    });
    this.scene.time.delayedCall(2500, () => {
      confetti.stop();
      this.scene.time.delayedCall(2000, () => { if (confetti.active) confetti.destroy(); });
    });

    const burst = this.scene.add.particles(cx, cy, '__DEFAULT', {
      speed:    { min: 120 * SCALE_FACTOR, max: 300 * SCALE_FACTOR },
      angle:    { min: 0, max: 360 },
      scale:    { start: 1.4 * SCALE_FACTOR, end: 0 },
      alpha:    { start: 1, end: 0 },
      lifespan: 1000,
      quantity: 60,
      tint:     [0xffd700, 0xffffff, 0xff69b4, 0x00cfff],
      emitting: false,
      depth:    20,
    });
    burst.explode(60);
    this.scene.time.delayedCall(1200, () => { if (burst.active) burst.destroy(); });
    this.scene.cameras.main.shake(600, 0.012);
    vibrate([200, 100, 200, 100, 200]);
  }
}

class GameScene extends Phaser.Scene {
  constructor() { super({ key: 'GameScene' }); }

  create() {
    activeScene = this;
    this._initState();
    this._initPhysics();
    this._initGraphics();
    this._initInput();
    this._initCollisions();
    startBgMusic();
    setTimeout(() => document.getElementById('loading-screen').classList.add('hidden'), 500);
  }

  _initState() {
    this.score         = 0;
    this.gameOver      = false;
    this.canDrop       = true;
    this.mouseX        = W / 2;
    this.currentType   = randNext();
    this.nextType      = randNext();
    this.gameOverShown = false;
    this.overlayContainer = null;
    drawPreview(this.nextType);
    updateScore(0);
  }

  _initPhysics() {
    this.matter.world.setGravity(0, 0.9);
    this.matter.world.setBounds(0, 0, W, H + 100 * SCALE_FACTOR, 32 * SCALE_FACTOR);
    this.matter.add.rectangle(W / 2, H + 30 * SCALE_FACTOR, W + 200 * SCALE_FACTOR, 60 * SCALE_FACTOR, {
      isStatic: true, friction: 0.7, restitution: 0.1,
    });
    this.matter.add.rectangle(-30 * SCALE_FACTOR,      H / 2, 60 * SCALE_FACTOR, H * 2, { isStatic: true, friction: 0.4 });
    this.matter.add.rectangle(W + 30 * SCALE_FACTOR,   H / 2, 60 * SCALE_FACTOR, H * 2, { isStatic: true, friction: 0.4 });
  }

  _initGraphics() {
    this.bg           = new Background(this);
    this.ballMgr      = new BallManager(this);
    this.effects      = new EffectsManager(this);
    this.guideGfx     = this.add.graphics().setDepth(2);
    this.lineGfx      = this.add.graphics().setDepth(2);
    this.previewGfx   = this.add.graphics().setDepth(3);
    this.previewLabel = this.add.text(W / 2, GAME_OVER_LINE, '', {
      fontFamily: 'serif',
      fontSize:   Math.floor(28 * SCALE_FACTOR) + 'px',
    }).setOrigin(0.5, 0.5).setDepth(4);
  }

  _initInput() {
    const canvas = this.sys.game.canvas;
    let touchActive = false;

    canvas.addEventListener('mousemove', e => {
      if (touchActive) return;
      const r = canvas.getBoundingClientRect();
      this.mouseX = Phaser.Math.Clamp((e.clientX - r.left) * (W / r.width), 0, W);
    });

    canvas.addEventListener('touchmove', e => {
      e.preventDefault();
      touchActive = true;
      if (e.touches.length > 0) {
        const r = canvas.getBoundingClientRect();
        this.mouseX = Phaser.Math.Clamp((e.touches[0].clientX - r.left) * (W / r.width), 0, W);
      }
    }, { passive: false });

    canvas.addEventListener('touchstart', e => {
      e.preventDefault();
      touchActive = true;
      if (e.touches.length > 0) {
        const r = canvas.getBoundingClientRect();
        this.mouseX = Phaser.Math.Clamp((e.touches[0].clientX - r.left) * (W / r.width), 0, W);
      }
    }, { passive: false });

    canvas.addEventListener('click', () => {
      if (touchActive) return;
      this._handleDrop();
    });

    canvas.addEventListener('touchend', e => {
      e.preventDefault();
      this._handleDrop();
      setTimeout(() => touchActive = false, 100);
    }, { passive: false });

    document.getElementById('menu-restart').onclick = () => {
      menuOverlay.classList.remove('open');
      this._reset();
    };
  }

  _handleDrop() {
    if (!this.canDrop || this.gameOver) return;
    this.ballMgr.drop(this.mouseX, this.currentType);
    this.currentType = this.nextType;
    this.nextType    = randNext();
    drawPreview(this.nextType);
    this.canDrop = false;
    this.time.delayedCall(380, () => { this.canDrop = true; });
  }

  _initCollisions() {
    this.matter.world.on('collisionstart', event => {
      event.pairs.forEach(({ bodyA, bodyB }) => {
        if (bodyA._type == null || bodyB._type == null) return;
        if (bodyA._type !== bodyB._type || bodyA._merged || bodyB._merged) return;
        if (bodyA._type >= ANIMALS.length - 1) return;
        bodyA._merged = bodyB._merged = true;

        const nt = bodyA._type + 1;
        const mx = (bodyA.position.x + bodyB.position.x) / 2;
        const my = (bodyA.position.y + bodyB.position.y) / 2;
        const vx = (bodyA.velocity.x + bodyB.velocity.x) * 0.25;
        const vy = (bodyA.velocity.y + bodyB.velocity.y) * 0.25;

        this.time.delayedCall(16, () => {
          this._lastMergeTime = Date.now();
          this.effects.spawnMerge(mx, my, nt);
          this.ballMgr.remove(bodyA);
          this.ballMgr.remove(bodyB);
          const nb = this.ballMgr.spawn(mx, my, nt);
          this.matter.body.setVelocity(nb, { x: vx, y: Math.max(vy, 1) });
          this.score += (nt + 1) * 2;
          updateScore(this.score);
          flashMergeCell(nt);
          if (nt === ANIMALS.length - 1) {
            this.time.delayedCall(400, () => this._showWin(mx, my));
          }
        });
      });
    });
  }

  _reset() {
    stopBgMusic();
    this.ballMgr.clear();
    if (this.overlayContainer) { this.overlayContainer.destroy(); this.overlayContainer = null; }
    this.score         = 0;
    this.gameOver      = false;
    this.canDrop       = true;
    this.gameOverShown = false;
    this._lastMergeTime = 0;
    this.currentType   = randNext();
    this.nextType      = randNext();
    drawPreview(this.nextType);
    updateScore(0);
    startBgMusic();
  }

  _dashedLine(gfx, x1, y1, x2, y2, dash, gap) {
    const dx  = x2 - x1, dy = y2 - y1;
    const len = Math.hypot(dx, dy);
    const nx  = dx / len, ny = dy / len;
    let pos = 0, on = true;
    while (pos < len) {
      const seg = Math.min(on ? dash : gap, len - pos);
      if (on) {
        gfx.beginPath();
        gfx.moveTo(x1 + nx * pos, y1 + ny * pos);
        gfx.lineTo(x1 + nx * (pos + seg), y1 + ny * (pos + seg));
        gfx.strokePath();
      }
      pos += seg;
      on = !on;
    }
  }

  _drawGuide() {
    this.guideGfx.clear();
    if (this.gameOver) return;
    const a = ANIMALS[this.currentType];
    const x = Phaser.Math.Clamp(this.mouseX, a.r + 4 * SCALE_FACTOR, W - a.r - 4 * SCALE_FACTOR);
    this.guideGfx.lineStyle(1 * SCALE_FACTOR, 0xffffff, 0.2);
    this._dashedLine(this.guideGfx, x, GAME_OVER_LINE, x, H, 6 * SCALE_FACTOR, 5 * SCALE_FACTOR);
  }

  _drawDangerLine() {
    this.lineGfx.clear();
    this.lineGfx.lineStyle(2 * SCALE_FACTOR, 0xff4444, 0.7);
    this._dashedLine(this.lineGfx, 0, GAME_OVER_LINE, W, GAME_OVER_LINE, 10 * SCALE_FACTOR, 6 * SCALE_FACTOR);
  }

  _drawPreviewBall() {
    this.previewGfx.clear();
    if (this.gameOver) { this.previewLabel.setVisible(false); return; }
    const a = ANIMALS[this.currentType];
    const x = Phaser.Math.Clamp(this.mouseX, a.r + 4 * SCALE_FACTOR, W - a.r - 4 * SCALE_FACTOR);
    const y = GAME_OVER_LINE - a.r - DROP_Y_OFFSET;

    this.previewGfx.fillStyle(0x000000, 0.18);
    this.previewGfx.fillEllipse(x, y + a.r + 5 * SCALE_FACTOR, a.r * 1.7, a.r * 0.38);
    this.previewGfx.fillStyle(a.color, 0.9);
    this.previewGfx.fillCircle(x, y, a.r);
    this.previewGfx.fillStyle(0xffffff, 0.2);
    this.previewGfx.fillCircle(x - a.r * 0.22, y - a.r * 0.26, a.r * 0.46);

    this.previewLabel.setVisible(true).setPosition(x, y + 2)
      .setText(a.emoji).setFontSize(Math.floor(a.r * 1.4));
  }

  _showWin(ex, ey) {
    if (this.gameOverShown) return;
    this.gameOverShown = true;
    this.gameOver      = true;
    this.canDrop       = false;
    stopBgMusic();
    playFanfare();
    this.effects.spawnWinEffect(W / 2, H / 2);

    this.time.delayedCall(1200, () => {
      playElephantSound();

      const overlay = this.add.graphics().setDepth(15);
      overlay.fillStyle(0x000000, 0.5);
      overlay.fillRect(0, 0, W, H);

      const panel = this.add.graphics().setDepth(16);
      const pw = 300 * SCALE_FACTOR, ph = 230 * SCALE_FACTOR;
      panel.fillStyle(0x1a1200, 0.97);
      panel.fillRoundedRect(W / 2 - pw / 2, H / 2 - ph / 2, pw, ph, 20 * SCALE_FACTOR);
      panel.lineStyle(3 * SCALE_FACTOR, 0xffd700, 0.9);
      panel.strokeRoundedRect(W / 2 - pw / 2, H / 2 - ph / 2, pw, ph, 20 * SCALE_FACTOR);

      const elephant = this.add.text(W / 2, H / 2 - 72 * SCALE_FACTOR, '🐘', {
        fontSize: Math.floor(52 * SCALE_FACTOR) + 'px',
      }).setOrigin(0.5, 0.5).setDepth(17);

      const title = this.add.text(W / 2, H / 2 - 10 * SCALE_FACTOR, 'Du hast gewonnen!', {
        fontSize:   Math.floor(26 * SCALE_FACTOR) + 'px',
        fontFamily: 'system-ui',
        color:      '#ffd700',
        fontStyle:  'bold',
      }).setOrigin(0.5, 0.5).setDepth(17);

      const sc = this.add.text(W / 2, H / 2 + 28 * SCALE_FACTOR, `Punkte: ${this.score}`, {
        fontSize:   Math.floor(18 * SCALE_FACTOR) + 'px',
        fontFamily: 'system-ui',
        color:      '#ffffff',
      }).setOrigin(0.5, 0.5).setDepth(17);

      const btnW = 180 * SCALE_FACTOR, btnH = 44 * SCALE_FACTOR;
      const btnBg = this.add.graphics().setDepth(17);
      btnBg.fillStyle(0xffd700, 1);
      btnBg.fillRoundedRect(W / 2 - btnW / 2, H / 2 + 62 * SCALE_FACTOR - btnH / 2, btnW, btnH, 12 * SCALE_FACTOR);

      const btnText = this.add.text(W / 2, H / 2 + 62 * SCALE_FACTOR, '🔄 Neu starten', {
        fontSize:   Math.floor(17 * SCALE_FACTOR) + 'px',
        fontFamily: 'system-ui',
        color:      '#1a1200',
        fontStyle:  'bold',
      }).setOrigin(0.5, 0.5).setDepth(18).setInteractive({ useHandCursor: true });

      btnText.on('pointerup', () => this._reset());

      const container = this.add.container(0, 0, [overlay, panel, elephant, title, sc, btnBg, btnText]).setDepth(15);
      container.setAlpha(0);
      this.tweens.add({
        targets:  container,
        alpha:    1,
        duration: 500,
        ease:     'Quad.easeOut',
        onComplete: () => {
          this.tweens.add({
            targets:  elephant,
            y:        H / 2 - 82 * SCALE_FACTOR,
            duration: 350,
            yoyo:     true,
            repeat:   -1,
            ease:     'Sine.easeInOut',
          });
        },
      });
      this.overlayContainer = container;
    });
  }

  _showGameOver() {
    if (this.gameOverShown) return;
    this.gameOverShown = true;
    this.effects.spawnGameOverEffect(W / 2, H / 2);

    const overlay = this.add.graphics().setDepth(15);
    overlay.fillStyle(0x000000, 0.58);
    overlay.fillRect(0, 0, W, H);

    const panel = this.add.graphics().setDepth(16);
    const pw = 270 * SCALE_FACTOR, ph = 190 * SCALE_FACTOR;
    panel.fillStyle(0x0d1117, 0.97);
    panel.fillRoundedRect(W / 2 - pw / 2, H / 2 - ph / 2, pw, ph, 18 * SCALE_FACTOR);
    panel.lineStyle(1 * SCALE_FACTOR, 0xffffff, 0.14);
    panel.strokeRoundedRect(W / 2 - pw / 2, H / 2 - ph / 2, pw, ph, 18 * SCALE_FACTOR);

    const title = this.add.text(W / 2, H / 2 - 44 * SCALE_FACTOR, 'Spiel vorbei', {
      fontSize:   Math.floor(30 * SCALE_FACTOR) + 'px',
      fontFamily: 'system-ui',
      color:      '#ffffff',
      fontStyle:  'bold',
    }).setOrigin(0.5, 0.5).setDepth(17);

    const sc = this.add.text(W / 2, H / 2 + 0 * SCALE_FACTOR, `Punkte: ${this.score}`, {
      fontSize:   Math.floor(20 * SCALE_FACTOR) + 'px',
      fontFamily: 'system-ui',
      color:      '#ffd700',
    }).setOrigin(0.5, 0.5).setDepth(17);

    const btnW = 180 * SCALE_FACTOR, btnH = 44 * SCALE_FACTOR;
    const btnBg = this.add.graphics().setDepth(17);
    btnBg.fillStyle(0x27ae60, 1);
    btnBg.fillRoundedRect(W / 2 - btnW / 2, H / 2 + 50 * SCALE_FACTOR - btnH / 2, btnW, btnH, 12 * SCALE_FACTOR);

    const btnText = this.add.text(W / 2, H / 2 + 50 * SCALE_FACTOR, '🔄 Neu starten', {
      fontSize:   Math.floor(17 * SCALE_FACTOR) + 'px',
      fontFamily: 'system-ui',
      color:      '#ffffff',
      fontStyle:  'bold',
    }).setOrigin(0.5, 0.5).setDepth(18).setInteractive({ useHandCursor: true });

    btnText.on('pointerup', () => this._reset());

    this.overlayContainer = this.add.container(0, 0, [overlay, panel, title, sc, btnBg, btnText]).setDepth(15);
    this.overlayContainer.setAlpha(0);
    this.tweens.add({ targets: this.overlayContainer, alpha: 1, duration: 380, ease: 'Quad.easeIn' });
  }

  update(time, delta) {
    this.bg.draw(this.score, delta);
    // Body-Hintergrund synchron zum Canvas-Biome lerpen (jeder Frame)
    _bgBodyColor = lerpHex(_bgBodyColor, BIOMES[getBiomeIndex(this.score)].bgColor, 0.012);
    document.body.style.background = _bgBodyColor;
    this._drawGuide();
    this._drawDangerLine();
    this._drawPreviewBall();
    this.ballMgr.draw(delta);

    if (!this.gameOver && this.ballMgr.checkGameOver()) {
      this.gameOver = true;
      this.canDrop  = false;
      this._showGameOver();
    }
  }
}

// ========================================
// KATEGORIE-SYSTEM
// ========================================
let gameStarted = false;
let activeScene = null;

function buildCatGrid(containerId, onSelect) {
  const grid = document.getElementById(containerId);
  if (!grid) return;
  grid.innerHTML = '';
  Object.entries(EMOJI_CATEGORIES).forEach(([key, cat]) => {
    const btn       = document.createElement('div');
    btn.className   = 'cat-btn' + (key === activeCategory ? ' active' : '');
    btn.dataset.cat = key;
    btn.innerHTML   = `<span class="cat-icon">${cat.icon}</span><span class="cat-label">${cat.label}</span>`;
    btn.addEventListener('click', () => { vibrate(8); onSelect(key); });
    grid.appendChild(btn);
  });
}

function refreshCatGrids() {
  document.querySelectorAll('.cat-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.cat === activeCategory);
  });
}

function applyCategory(key, scene) {
  activeCategory = key;
  ANIMALS.length = 0;
  getAnimalsForCategory(key).forEach(a => ANIMALS.push(a));
  refreshCatGrids();
  if (document.getElementById('merge-bar').children.length > 0) initMergeBar();
  if (scene) {
    // Nur Bälle leeren + neue Typen vergeben – KEIN vollstaendiger Reset
    // Score, gameOver-State und Physik bleiben erhalten
    scene.ballMgr && scene.ballMgr.clear();
    if (!scene.gameOver) {
      scene.currentType = randNext();
      scene.nextType    = randNext();
      scene.canDrop     = true;
      drawPreview(scene.nextType);
    }
  }
}

function startGameAfterUserTap() {
  if (gameStarted) return;
  gameStarted = true;

  // AudioContext entsperren
  try {
    const ctx   = getAudioCtx();
    const empty = ctx.createBuffer(1, 1, 22050);
    const src   = ctx.createBufferSource();
    src.buffer  = empty;
    src.connect(ctx.destination);
    src.start(0);
  } catch (e) { console.warn(e); }

  document.getElementById('start-screen').style.display = 'none';
  initMergeBar();

  new Phaser.Game({
    type:            Phaser.CANVAS,   // Canvas statt AUTO – stabiler auf iOS Safari
    width:           W,
    height:          H,
    resolution:      Math.min(window.devicePixelRatio || 1, 2), // max 2x – spart GPU
    pixelArt:        false,
    roundPixels:     true,            // verhindert Sub-Pixel-Zittern
    backgroundColor: '#082b18',
    parent:          'phaser-container',
    fps: {
      target: 60,
      forceSetTimeOut: false,        // rAF bevorzugen
      smoothStep: true,              // glättet unregelmäßige Frames
    },
    physics: {
      default: 'matter',
      matter: {
        gravity:            { y: 0.9 },
        debug:              false,
        enableSleeping:     true,     // schlafende Bälle brauchen keine Physik-Ticks
        positionIterations: 6,        // reduziert von 10 → weniger CPU pro Frame
        velocityIterations: 4,
        constraintIterations: 2,
      },
    },
    scene: [GameScene],
  });
}

// ========================================
// INIT
// ========================================
window.addEventListener('DOMContentLoaded', () => {
  const versionDisplay = document.getElementById('version-display');
  if (versionDisplay) versionDisplay.textContent = `Version ${VERSION}`;

  updateDynamicBackground(0);

  buildCatGrid('start-cat-grid', key => {
    activeCategory = key;
    ANIMALS.length = 0;
    getAnimalsForCategory(key).forEach(a => ANIMALS.push(a));
    refreshCatGrids();
    const icon = document.querySelector('#start-screen > div:first-child');
    if (icon) icon.textContent = EMOJI_CATEGORIES[key].emojis[EMOJI_CATEGORIES[key].emojis.length - 1];
  });

  buildCatGrid('menu-cat-grid', key => {
    applyCategory(key, activeScene);
    menuOverlay.classList.remove('open');
  });

  const startBtn = document.getElementById('start-btn');
  if (startBtn) {
    startBtn.addEventListener('click', startGameAfterUserTap);
    startBtn.addEventListener('touchend', e => { e.preventDefault(); startGameAfterUserTap(); });
  }
});
