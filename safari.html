<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}

  #game-wrapper{width:100vw;height:100vh;height:100dvh;max-width:480px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:min(2vw,10px);padding:max(env(safe-area-inset-top),8px) env(safe-area-inset-right) max(env(safe-area-inset-bottom),8px) env(safe-area-inset-left);position:relative;z-index:1}

  #hud{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;width:min(calc(100vw - 20px),420px);padding:min(2vw,8px) min(3.3vw,14px);background:rgba(255,255,255,.07);border-radius:min(3.3vw,14px);border:1px solid rgba(255,255,255,.1);color:#fff;backdrop-filter:blur(10px)}

  #score-box{display:flex;flex-direction:column;align-items:flex-end}

  #gear-btn{width:min(8.1vw,34px);height:min(8.1vw,34px);display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);border-radius:50%;cursor:pointer;font-size:min(4vw,17px);transition:all .18s;justify-self:center;touch-action:manipulation}

  #phaser-container{position:relative;width:min(calc(100vw - 20px),420px);aspect-ratio:420/580}
  #phaser-container canvas{width:100%!important;height:100%!important;border-radius:min(3.8vw,16px);display:block;touch-action:none}
  #phaser-container::after{content:"";position:absolute;inset:0;border-radius:inherit;border:2px solid rgba(255,255,255,.35);box-shadow:0 0 12px rgba(255,255,255,.25),inset 0 0 8px rgba(255,255,255,.15);pointer-events:none}

  #menu-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(8px);z-index:100;align-items:center;justify-content:center;animation:fadeIn .2s ease}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}

  @keyframes slideUp{from{opacity:0;transform:translateY(20px) scale(.95)}to{opacity:1;transform:none}}

  .cat-btn.active{border-color:rgba(255,220,80,.8);background:rgba(255,220,80,.14);box-shadow:0 0 10px rgba(255,220,80,.2)}
  .cat-btn:active{transform:scale(.94)}
  .cat-btn .cat-icon{font-size:min(5.7vw,22px);line-height:1}
  .cat-btn .cat-label{font-size:min(2vw,8px);opacity:.65;text-align:center;line-height:1.1;color:#fff}

  #merge-bar{width:min(calc(100vw - 20px),420px);background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:min(3.3vw,14px);padding:min(1.9vw,8px) min(2.4vw,10px);display:flex;align-items:center;justify-content:space-between;gap:min(.7vw,3px);backdrop-filter:blur(10px)}

  #start-screen{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;z-index:2000;color:white;font-family:system-ui;text-align:center;gap:18px;padding:max(24px,env(safe-area-inset-top)) max(16px,env(safe-area-inset-right)) max(34px,env(safe-area-inset-bottom)) max(16px,env(safe-area-inset-left));overflow-y:auto}

<body>

<canvas id="game-bg-canvas"></canvas>

<div id="start-screen">

<div id="game-wrapper" style="display:none">

<script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.60.0/phaser.min.js"></script>
<script>
// ── Konstanten ───────────────────────────────────────────────────────────────
const VERSION = '0.3.3';
const MAX_DROP_ANIMAL_INDEX = 3;
const DAY_CYCLE_SECONDS = 240;

// ── Audio ────────────────────────────────────────────────────────────────────
let muted = false, musicVolume = 0.85, sfxVolume = 0.85;
let audioCtx = null, _seqRunning = false, _seqHandle = null;
let _seqStep = 0, _seqSection = 0, _activeTrackKey = 'town_chill';
let _masterGain = null, _crossfadeGain = null;
let _currentStackRatio = 0;
let _hihatBuf = null, _hihatBufCtx = null;

function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function getMasterGain() {
  if (_masterGain) return _masterGain;
  const ctx = getAudioCtx();
  if (!_crossfadeGain) {
    _crossfadeGain = ctx.createGain();
    _crossfadeGain.gain.value = 1;
    _crossfadeGain.connect(ctx.destination);
  }
  _masterGain = ctx.createGain();
  _masterGain.gain.value = musicVolume;
  _masterGain.connect(_crossfadeGain);
  return _masterGain;
}

function _note(ctx, time, freq, type, dur, vol, out) {
  if (muted) return;
  try {
    const osc = ctx.createOscillator(), gain = ctx.createGain();
    const lfo = ctx.createOscillator(), lfoG = ctx.createGain();
    osc.type = type; osc.frequency.value = freq;
    lfo.frequency.value = 4.5; lfoG.gain.value = freq * 0.006;
    lfo.connect(lfoG); lfoG.connect(osc.frequency);
    gain.gain.setValueAtTime(0, time);
    gain.gain.linearRampToValueAtTime(vol, time + Math.min(dur * 0.18, 0.06));
    gain.gain.setValueAtTime(vol * 0.82, time + dur * 0.5);
    gain.gain.linearRampToValueAtTime(0, time + dur);
    osc.connect(gain); gain.connect(out);
    lfo.start(time); lfo.stop(time + dur + 0.05);
    osc.start(time); osc.stop(time + dur + 0.05);
  } catch(_) {}
}

function _kick(ctx, time, out) {
  try {
    const osc = ctx.createOscillator(), gain = ctx.createGain();
    osc.frequency.setValueAtTime(90, time);
    osc.frequency.exponentialRampToValueAtTime(38, time + 0.14);
    gain.gain.setValueAtTime(0.22, time);
    gain.gain.exponentialRampToValueAtTime(0.001, time + 0.20);
    osc.connect(gain); gain.connect(out);
    osc.start(time); osc.stop(time + 0.22);
  } catch(_) {}
}

function _hihat(ctx, time, out) {
  try {
    if (!_hihatBuf || _hihatBufCtx !== ctx) {
      const buf = ctx.createBuffer(1, Math.floor(ctx.sampleRate * 0.05), ctx.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * 0.4;
      _hihatBuf = buf; _hihatBufCtx = ctx;
    }
    const src = ctx.createBufferSource(), hp = ctx.createBiquadFilter(), gain = ctx.createGain();
    src.buffer = _hihatBuf; hp.type = 'highpass'; hp.frequency.value = 6000;
    gain.gain.setValueAtTime(0.10, time);
    gain.gain.exponentialRampToValueAtTime(0.001, time + 0.06);
    src.connect(hp); hp.connect(gain); gain.connect(out);
    src.start(time); src.stop(time + 0.07);
  } catch(_) {}
}

function _snare(ctx, time, out) {
  try {
    const buf = ctx.createBuffer(1, Math.floor(ctx.sampleRate * 0.12), ctx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
    const src = ctx.createBufferSource(), hp = ctx.createBiquadFilter(), gn = ctx.createGain();
    src.buffer = buf; hp.type = 'highpass'; hp.frequency.value = 1800;
    gn.gain.setValueAtTime(0.18, time); gn.gain.exponentialRampToValueAtTime(0.001, time + 0.10);
    src.connect(hp); hp.connect(gn); gn.connect(out);
    src.start(time); src.stop(time + 0.13);
    const osc = ctx.createOscillator(), og = ctx.createGain();
    osc.frequency.setValueAtTime(180, time); osc.frequency.exponentialRampToValueAtTime(80, time + 0.06);
    og.gain.setValueAtTime(0.14, time); og.gain.exponentialRampToValueAtTime(0.001, time + 0.08);
    osc.connect(og); og.connect(out); osc.start(time); osc.stop(time + 0.09);
  } catch(_) {}
}

// Musik-Tracks
const MUSIC_TRACKS = {
  town_chill:{label:'Town Chill',icon:'🏘️',sections:[
    {tempo:560,mel:[392,null,440,null,392,330,null,294,330,null,294,262,null,294,null,330],mel2:[null,247,null,247,null,null,196,null,null,196,null,null,175,null,196,null],bass:[131,null,null,165,null,131,null,null,110,null,null,131,null,110,null,null],drums:[1,0,0,2,0,1,0,2,1,0,0,2,0,1,0,2]},
    {tempo:560,mel:[330,null,294,330,null,392,null,440,392,null,330,null,294,null,330,null],mel2:[null,196,null,null,247,null,247,null,null,247,null,196,null,196,null,247],bass:[98,null,null,110,null,null,131,null,110,null,null,98,null,null,110,null],drums:[1,0,0,2,1,0,1,2,0,0,1,2,1,0,0,2]},
    {tempo:540,mel:[523,null,494,null,440,null,392,null,440,494,523,null,587,null,523,null],mel2:[null,330,null,311,null,262,null,247,null,null,null,330,null,370,null,330],bass:[131,null,165,null,131,null,110,null,131,null,131,null,165,null,131,null],drums:[1,0,1,2,0,0,1,2,1,0,1,2,0,1,0,2]},
    {tempo:600,mel:[262,null,null,294,null,null,330,null,null,294,null,null,262,null,null,null],mel2:[null,null,196,null,null,175,null,null,196,null,null,175,null,null,165,null],bass:[98,null,null,null,131,null,null,null,98,null,null,null,110,null,null,null],drums:[1,0,0,0,2,0,0,0,1,0,0,2,0,0,0,0]},
  ]},
  power:{label:'Power',icon:'⚡',sections:[
    {tempo:250,mel:[330,null,330,392,null,440,392,330,494,null,440,null,392,330,null,294],mel2:[null,220,null,null,247,null,null,null,null,311,null,277,null,null,220,null],bass:[165,null,165,null,165,null,247,null,220,null,220,null,247,null,165,null],drums:[1,0,2,3,1,0,2,3,1,2,2,3,1,0,2,3]},
    {tempo:250,mel:[494,523,587,659,null,740,659,587,659,null,587,null,523,494,null,440],mel2:[null,null,null,null,415,null,null,370,null,415,null,370,null,null,330,null],bass:[165,null,165,null,247,null,247,null,220,null,220,null,196,null,165,null],drums:[1,0,2,3,1,1,2,3,1,0,2,3,1,2,0,3]},
    {tempo:280,mel:[330,null,null,null,294,null,null,null,262,null,null,294,330,null,null,null],mel2:[null,null,220,null,null,196,null,null,null,175,null,null,null,220,null,null],bass:[165,null,null,null,147,null,null,null,131,null,null,null,165,null,null,null],drums:[1,0,0,0,2,0,0,2,1,0,2,0,3,0,0,3]},
    {tempo:230,mel:[330,392,440,494,523,494,440,392,330,392,440,494,659,587,523,494],mel2:[null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,330],bass:[165,null,null,null,131,null,null,null,165,null,null,null,247,null,196,null],drums:[1,0,2,3,1,2,0,3,1,0,2,3,4,2,3,4]},
  ]},
  fun:{label:'Fun',icon:'🎉',sections:[
    {tempo:340,mel:[392,null,440,494,null,523,null,494,440,null,392,null,440,494,523,null],mel2:[null,294,null,null,330,null,330,null,null,262,null,294,null,null,null,349],bass:[196,null,null,196,null,220,null,196,196,null,175,null,196,null,220,null],drums:[1,0,1,0,2,0,1,2,1,0,1,0,2,1,0,2]},
    {tempo:340,mel:[587,null,523,null,494,null,440,null,523,587,659,null,587,523,null,494],mel2:[null,370,null,330,null,311,null,294,null,null,null,415,null,null,330,null],bass:[196,null,220,null,196,null,175,null,196,null,220,null,247,null,196,null],drums:[1,0,0,2,1,0,1,2,1,1,0,2,1,0,1,2]},
    {tempo:360,mel:[440,415,392,null,349,370,392,null,415,440,null,466,440,415,392,null],mel2:[null,null,null,262,null,null,null,247,null,null,277,null,null,null,null,233],bass:[110,null,null,110,null,null,110,null,104,null,null,110,null,null,98,null],drums:[1,0,1,2,1,0,0,2,1,0,1,2,0,1,0,2]},
    {tempo:320,mel:[523,587,659,null,698,null,659,587,523,587,659,698,784,null,698,659],mel2:[null,null,null,415,null,440,null,null,null,null,null,null,null,523,null,415],bass:[131,null,165,null,131,null,196,null,131,null,165,null,196,null,165,null],drums:[1,0,1,2,1,1,0,2,1,0,1,2,4,0,1,2]},
  ]},
};

function _getTempoMs(base) {
  return Math.max(55, Math.floor(base / Math.pow(4, _currentStackRatio)));
}

function _seqTick() {
  if (!_seqRunning || muted) return;
  const ctx = getAudioCtx(), now = ctx.currentTime;
  const sections = MUSIC_TRACKS[_activeTrackKey].sections;
  _seqSection = Math.floor(_seqStep / 32) % sections.length;
  const track = sections[_seqSection], step = _seqStep % 16;
  const t = _getTempoMs(track.tempo), out = getMasterGain();
  if (track.mel[step])  _note(ctx, now, track.mel[step],  'sine',     t*.00085, 0.13, out);
  if (track.mel2[step]) _note(ctx, now, track.mel2[step], 'triangle', t*.0012,  0.07, out);
  if (track.bass[step]) _note(ctx, now, track.bass[step], 'sine',     t*.0020,  0.17, out);
  const d = track.drums[step];
  if (d===1||d===4) _kick(ctx, now, out);
  if (d===2||d===4) _hihat(ctx, now, out);
  if (d===3) _snare(ctx, now, out);
  _seqStep++;
  _seqHandle = setTimeout(_seqTick, t);
}

function startBgMusic() {
  if (muted || _seqRunning) return;
  _seqRunning = true; _seqStep = 0; _seqSection = 0; _seqTick();
}

function stopBgMusic() {
  if (_seqHandle) { clearTimeout(_seqHandle); _seqHandle = null; }
  _seqRunning = false;
}

function switchMusicTrack(key) {
  if (key === _activeTrackKey) return;
  _activeTrackKey = key;
  const cfg = _crossfadeGain, ctx = getAudioCtx(), now = ctx.currentTime;
  if (!cfg) { _seqStep = 0; _seqSection = 0; return; }
  cfg.gain.cancelScheduledValues(now);
  cfg.gain.setValueAtTime(cfg.gain.value, now);
  cfg.gain.linearRampToValueAtTime(0, now + 0.4);
  setTimeout(() => {
    _seqStep = 0; _seqSection = 0; _hihatBuf = null;
    if (!muted && _seqRunning && _crossfadeGain) {
      const c2 = _crossfadeGain, ctx2 = getAudioCtx();
      c2.gain.cancelScheduledValues(ctx2.currentTime);
      c2.gain.setValueAtTime(0, ctx2.currentTime);
      c2.gain.linearRampToValueAtTime(1, ctx2.currentTime + 0.5);
    }
  }, 420);
}

function resetBgMusic() {
  _seqStep = 0; _seqSection = 0; _currentStackRatio = 0; _hihatBuf = null;
  if (_crossfadeGain) {
    try {
      const ctx = getAudioCtx();
      _crossfadeGain.gain.cancelScheduledValues(ctx.currentTime);
      _crossfadeGain.gain.setValueAtTime(1, ctx.currentTime);
    } catch(_) {}
  }
}

function updateMusicTempo(balls) {
  if (!balls?.length) { _currentStackRatio = 0; return; }
  const now = Date.now();
  let highestY = H;
  for (const b of balls) {
    if (!b.body || now - b.body._spawnTime < 1000) continue;
    if (Math.hypot(b.body.velocity.x, b.body.velocity.y) > 1.5) continue;
    const top = b.body.position.y - ANIMALS[b.body._type].r;
    if (top < highestY) highestY = top;
  }
  const newRatio = Math.max(0, Math.min(1, (H - highestY) / (H - GAME_OVER_LINE)));
  const target = newRatio < 0.33 ? 0 : newRatio < 0.60 ? 0.33 : newRatio < 0.82 ? 0.66 : 1;
  _currentStackRatio += (target - _currentStackRatio) * 0.08;
}

function playMergeSound(level) {
  if (muted) return;
  const ctx = getAudioCtx(), t = ctx.currentTime, out = getMasterGain();
  const roots = [262,294,330,370,392,440,494,523,587,659];
  const root = roots[Math.min(level, roots.length-1)];
  [[root,0],[root*1.003,.01]].forEach(([freq,offset]) => {
    const osc = ctx.createOscillator(), gain = ctx.createGain();
    osc.type = 'sine'; osc.frequency.value = freq;
    gain.gain.setValueAtTime(0, t+offset);
    gain.gain.linearRampToValueAtTime(.18*sfxVolume, t+offset+.04);
    gain.gain.setValueAtTime(.16*sfxVolume, t+offset+.12);
    gain.gain.linearRampToValueAtTime(0, t+offset+.55);
    osc.connect(gain); gain.connect(out); osc.start(t+offset); osc.stop(t+.62);
  });
  if (level >= 4) {
    const osc = ctx.createOscillator(), gain = ctx.createGain();
    osc.type = 'sine'; osc.frequency.value = root * 1.5;
    gain.gain.setValueAtTime(0, t+.08); gain.gain.linearRampToValueAtTime(.09, t+.14); gain.gain.linearRampToValueAtTime(0, t+.50);
    osc.connect(gain); gain.connect(out); osc.start(t+.08); osc.stop(t+.52);
  }
}

function _borderColor(hex) {
  const mix = c => Math.round(c + (255-c)*.30);
  const dim = c => Math.round(c*.82);
  const r=dim(mix((hex>>16)&0xff)), g=dim(mix((hex>>8)&0xff)), b=dim(mix(hex&0xff));
  return (r<<16)|(g<<8)|b;
}

function _sanitizeColor(hex) {
  const r=(hex>>16)&0xff, g=(hex>>8)&0xff, b=hex&0xff;
  if ((r*299+g*587+b*114)/1000 > 235) {
    return (Math.round(r*.82)<<16)|(Math.round(g*.82)<<8)|Math.round(b*.82);
  }
  return hex;
}

function hexToRgb(hex) { const n=parseInt(hex.replace('#',''),16); return [(n>>16)&255,(n>>8)&255,n&255]; }
function lerpHex(a,b,t) {
  const [ar,ag,ab]=hexToRgb(a),[br,bg,bb]=hexToRgb(b);
  const l=(x,y)=>Math.round(Math.max(0,Math.min(255,x+(y-x)*t)));
  return '#'+[l(ar,br),l(ag,bg),l(ab,bb)].map(v=>v.toString(16).padStart(2,'0')).join('');
}

function _sampleKeys(keys, phase) {
  for (let i=0;i<keys.length-1;i++) {
    const a=keys[i],b=keys[i+1];
    if (phase>=a.p&&phase<=b.p) {
      const t=(phase-a.p)/(b.p-a.p);
      return a.c!==undefined ? lerpHex(a.c,b.c,t) : [lerpHex(a.top,b.top,t),lerpHex(a.bot,b.bot,t)];
    }
  }
  return keys[0].c||[keys[0].top,keys[0].bot];
}

function getDayPhase() {
  return ((Date.now()-_dayCycleStart)/1000 % DAY_CYCLE_SECONDS) / DAY_CYCLE_SECONDS;
}

// ── Hintergrund-Canvas ───────────────────────────────────────────────────────
// ── Sternsystem ──────────────────────────────────────────────────────────────
// Einmalig generiert beim Laden – zufällige Positionen, Größen, Farben, Phasen
const _STARS = (function() {
  // Seeded pseudo-random für reproduzierbare aber schöne Verteilung
  let seed = 42;
  const rng = () => { seed = (seed * 1664525 + 1013904223) & 0xffffffff; return (seed >>> 0) / 0xffffffff; };

  const stars = [];
  // 120 Sterne in 3 Kategorien: hell, mittel, schwach
  const configs = [
    { count: 15, rMin: 1.4, rMax: 2.2, brightness: [0.7, 1.0], flickerSpeed: [0.8, 1.8],  flickerDepth: [0.25, 0.45] }, // Hauptsterne
    { count: 40, rMin: 0.8, rMax: 1.5, brightness: [0.4, 0.8], flickerSpeed: [1.2, 2.8],  flickerDepth: [0.15, 0.35] }, // Mittelhell
    { count: 65, rMin: 0.4, rMax: 0.9, brightness: [0.2, 0.5], flickerSpeed: [1.8, 4.0],  flickerDepth: [0.08, 0.20] }, // Hintergrundsterne
  ];

  for (const cfg of configs) {
    for (let i = 0; i < cfg.count; i++) {
      // Gleichmäßige Verteilung über den Himmelsbereich (oben 55% des Bildschirms)
      // Mit leichter Häufung Richtung Horizont (Milchstraßen-Effekt)
      const yRaw = rng();
      const yFrac = yRaw * yRaw * 0.55; // quadratisch → mehr Sterne oben
      const xFrac = rng();

      // Sternfarbe: von warmweiß über weiß zu kaltblau
      const colorRoll = rng();
      const color = colorRoll < 0.2  ? [255, 240, 200]  // Warmweiß (K-Stern)
                  : colorRoll < 0.55 ? [255, 255, 255]  // Reinweiß (G-Stern)
                  : colorRoll < 0.80 ? [220, 235, 255]  // Hellblau (A-Stern)
                  :                    [180, 210, 255];  // Kaltblau (B-Stern)

      stars.push({
        xFrac,
        yFrac,
        r: cfg.rMin + rng() * (cfg.rMax - cfg.rMin),
        baseBrightness: cfg.brightness[0] + rng() * (cfg.brightness[1] - cfg.brightness[0]),
        flickerSpeed:   cfg.flickerSpeed[0]  + rng() * (cfg.flickerSpeed[1]  - cfg.flickerSpeed[0]),
        flickerDepth:   cfg.flickerDepth[0]  + rng() * (cfg.flickerDepth[1]  - cfg.flickerDepth[0]),
        flickerPhase:   rng() * Math.PI * 2, // jeder Stern flackert versetzt
        color,
      });
    }
  }
  return stars;
})();

function _drawStars(ctx, W2, H2, nightAlpha, time) {
  if (nightAlpha <= 0.01) return;
  ctx.save();
  for (const s of _STARS) {
    // Flackern: Kombination aus zwei Sinuswellen unterschiedlicher Frequenz → unregelmäßig
    const flicker = 1
      - s.flickerDepth * (
          0.6 * Math.sin(time * s.flickerSpeed + s.flickerPhase)
        + 0.4 * Math.sin(time * s.flickerSpeed * 1.7 + s.flickerPhase * 0.5)
      );
    const alpha = nightAlpha * s.baseBrightness * flicker;
    if (alpha < 0.02) continue;

    const x = s.xFrac * W2;
    const y = s.yFrac * H2;

    // Leuchtschimmer um helle Sterne
    if (s.r > 1.2 && alpha > 0.4) {
      const glow = ctx.createRadialGradient(x, y, 0, x, y, s.r * 4);
      glow.addColorStop(0, `rgba(${s.color[0]},${s.color[1]},${s.color[2]},${alpha * 0.35})`);
      glow.addColorStop(1, `rgba(${s.color[0]},${s.color[1]},${s.color[2]},0)`);
      ctx.fillStyle = glow;
      ctx.beginPath(); ctx.arc(x, y, s.r * 4, 0, Math.PI * 2); ctx.fill();
    }

    // Sternkern
    ctx.fillStyle = `rgba(${s.color[0]},${s.color[1]},${s.color[2]},${Math.min(1, alpha)})`;
    ctx.beginPath(); ctx.arc(x, y, s.r, 0, Math.PI * 2); ctx.fill();
  }
  ctx.restore();
}

let _gbcPhase = 0.5;
let _gbcSky0 = '#1878c8';
let _gbcSky1 = '#60b0e8';
let _gbcHills = '#58a838';
let _gbcPlants = '#50c040';

let _gbcTime = 0;
let _gbcCtx = null;
let _gbcFrame = null;
let _gbcRunning = false;


function _resizeGbc() {
  const c=document.getElementById('game-bg-canvas');
  if (!c) return;
  c.width=window.innerWidth; c.height=window.innerHeight; _gbcCtx=null;
}

function _drawGbc() {
  
  if (!_gbcRunning) return;
  const c=document.getElementById('game-bg-canvas');
  if (!c) return;
  if (!_gbcCtx) _gbcCtx=c.getContext('2d');
  const W2=c.width, H2=c.height;
  _gbcCtx.clearRect(0,0,W2,H2);
  _gbcTime+=0.004;

  const phase=getDayPhase();
  const spd=0.008;
  const sky=_sampleKeys(SKY_KEYS,phase);
  _gbcSky0=lerpHex(_gbcSky0,sky[0],spd);
  _gbcSky1=lerpHex(_gbcSky1,sky[1],spd);
  _gbcHills=lerpHex(_gbcHills,_sampleKeys(HILL_KEYS,phase),spd);
  _gbcPlants=lerpHex(_gbcPlants,_sampleKeys(PLANT_KEYS,phase),spd);
  _gbcPhase=phase;

  const grad=_gbcCtx.createLinearGradient(0,0,0,H2);
  grad.addColorStop(0,_gbcSky0); grad.addColorStop(0.75,_gbcSky1); grad.addColorStop(1,_gbcSky1);
  _gbcCtx.fillStyle=grad; _gbcCtx.fillRect(0,0,W2,H2);

  // Sterne – schönes Flacker-System
  if (phase < 0.32 || phase > 0.72) {
    const nightAlpha = phase < 0.32
      ? Math.min(1, (0.32 - phase) * 7)
      : Math.min(1, (phase - 0.72) * 7);
    _drawStars(_gbcCtx, W2, H2, nightAlpha, _gbcTime);
  }

  // Wolken
  if (phase>0.35&&phase<0.65) {
    const ca=Math.min(1,Math.min(phase-0.35,0.65-phase)*12)*.45;
    if (ca>0.01) {
      const clouds=[
        {xOff:0,   yFrac:.04,r:18,spd:1.0,puffs:[[0,0,1],[12,-4,.72],[22,0,.55]]},
        {xOff:.22, yFrac:.09,r:14,spd:.7, puffs:[[0,0,1],[10,-3,.8],[20,0,.6],[-5,3,.45]]},
        {xOff:.45, yFrac:.05,r:11,spd:1.4,puffs:[[0,0,1],[8,-3,.7],[16,0,.5]]},
        {xOff:.68, yFrac:.12,r:16,spd:.9, puffs:[[0,0,1],[13,-4,.75],[26,2,.6],[19,-2,.42]]},
        {xOff:.85, yFrac:.07,r:13,spd:1.1,puffs:[[0,0,1],[10,-3,.7],[20,0,.55]]},
      ];
      _gbcCtx.fillStyle=`rgba(255,255,255,${ca})`;
      for (const cl of clouds) {
        const startX = typeof cl.xOff === 'number' && cl.xOff < 1 ? cl.xOff * W2 : cl.xOff;
        const cx2=((startX+_gbcTime*cl.spd*20)%(W2+200))-60, cy2=cl.yFrac*H2;
        _gbcCtx.beginPath();
        for (const [dx,dy,rs] of cl.puffs) {
          _gbcCtx.arc(cx2+dx,cy2+dy,Math.max(.1,rs*cl.r),0,Math.PI*2);
        }
        _gbcCtx.fill();
      }
    }
  }

  // Hügel hinten
  _gbcCtx.save(); _gbcCtx.globalAlpha=.92; _gbcCtx.fillStyle=_gbcHills;
  _gbcCtx.beginPath(); _gbcCtx.moveTo(0,H2);
  for (let x=0;x<=W2;x+=4) {
    _gbcCtx.lineTo(x,H2-H2*.22+Math.sin(x*.013+_gbcTime*.65)*H2*.022+Math.sin(x*.005+_gbcTime*.26)*H2*.012);
  }
  _gbcCtx.lineTo(W2,H2); _gbcCtx.closePath(); _gbcCtx.fill(); _gbcCtx.restore();

  // Hügel vorne
  _gbcCtx.save(); _gbcCtx.fillStyle=_gbcPlants;
  _gbcCtx.beginPath(); _gbcCtx.moveTo(0,H2);
  for (let x=0;x<=W2;x+=4) {
    _gbcCtx.lineTo(x,H2-H2*.14+Math.sin(x*.015+_gbcTime*1.15)*H2*.018+Math.sin(x*.009+_gbcTime*.40)*H2*.010);
  }
  _gbcCtx.lineTo(W2,H2); _gbcCtx.closePath(); _gbcCtx.fill(); _gbcCtx.restore();

  _gbcFrame=requestAnimationFrame(_drawGbc);
}

function initMergeBar() {
  mergeBar.innerHTML=''; mergeCells.length=0;
  const cellSize=Math.max(8,Math.floor((mergeBar.offsetWidth||380-20-9*3)/10));
  const dpr=window.devicePixelRatio||1;
  ANIMALS.forEach((a,i)=>{
    const cell=document.createElement('div'); cell.className='merge-cell'; cell.id='mc-'+i;
    const cv=document.createElement('canvas');
    cv.width=cv.height=cellSize*dpr;
    cv.style.width=cv.style.height=cellSize+'px';
    const arrow=document.createElement('span'); arrow.className='merge-arrow'; arrow.textContent='▶';
    cell.append(cv,arrow); mergeBar.appendChild(cell);
    const ctx=cv.getContext('2d'); ctx.scale(dpr,dpr);
    mergeCells.push({canvas:cv,ctx,cell,size:cellSize});
    _drawMergeCell(i,cellSize,ctx);
  });
}

function _drawMergeCell(i,size,ctx) {
  const a=ANIMALS[i], cx=cy=size/2, r=Math.max(1,size*.42);
  ctx.clearRect(0,0,size,size);
  ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2);
  ctx.fillStyle='#'+a.color.toString(16).padStart(6,'0'); ctx.fill();
  const bc=_borderColor(a.color);
  ctx.strokeStyle=`rgb(${(bc>>16)&0xff},${(bc>>8)&0xff},${bc&0xff})`;
  ctx.lineWidth=Math.max(1,r*.1); ctx.stroke();
  ctx.font=`${Math.round(r*1.6)}px serif`;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.shadowColor='rgba(0,0,0,.35)'; ctx.shadowBlur=Math.max(1,r*.15); ctx.shadowOffsetY=1;
  ctx.fillText(a.emoji,cx,cy+1);
  ctx.shadowColor='transparent'; ctx.shadowBlur=ctx.shadowOffsetY=0;
}

function flashMergeCell(i) {
  const {cell,canvas}=mergeCells[i], c=ANIMALS[i].color;
  canvas.style.boxShadow=`0 0 12px 5px rgba(${(c>>16)&0xff},${(c>>8)&0xff},${c&0xff},.95)`;
  canvas.style.transform='scale(1.18)'; cell.classList.add('just-merged');
  if (flashTimers[i]) clearTimeout(flashTimers[i]);
  flashTimers[i]=setTimeout(()=>{
    cell.classList.remove('just-merged'); canvas.style.boxShadow=canvas.style.transform='';
  },600);
}

// ── Phaser Szenen ────────────────────────────────────────────────────────────
class BallManager {
  constructor(scene) { this.scene=scene; this.balls=[]; }

  drop(mouseX, type) {
    const a=ANIMALS[type];
    const x=Phaser.Math.Clamp(mouseX, a.r+1, W-a.r-1);
    playDropSound(); vibrate(5);
    return this.spawn(x, GAME_OVER_LINE-a.r, type, 0.3);
  }

  spawn(x, y, type, scale=0.6) {
    const a=ANIMALS[type];
    // Physikalisch korrekte Dichte: größere Bälle sind schwerer, aber nicht überproportional
    const density = 0.002 + (type/9)*0.003;
    // Elastizität nimmt mit Größe ab (kleine Bälle hüpfen mehr)
    const restitution = 0.28 - (type/9)*0.22;
    // Reibung: mittel, damit Bälle nicht endlos rollen aber auch nicht kleben
    const body=this.scene.matter.add.circle(x, y, a.r, {
      restitution,
      friction: 0.08,
      frictionStatic: 0.05,
      frictionAir: 0.008,
      density,
      slop: 0,
      label: 'ball',
      sleepThreshold: 120,
      inertia: Infinity, // keine Rotation → kein Ecken-Verhaken
    });
    body._type=type; body._merged=false; body._spawnTime=Date.now();

    const texKey=`ball_${type}`;
    if (!this.scene.textures.exists(texKey)) this._makeTexture(texKey,a);
    const sprite=this.scene.add.image(0,0,texKey).setDisplaySize(a.r*2,a.r*2);
    const label=this.scene.add.text(0,1,a.emoji,{fontSize:Math.floor(a.r*1.4)+'px',fontFamily:'serif'}).setOrigin(.5,.5);
    const container=this.scene.add.container(x,y,[sprite,label]).setDepth(1).setScale(scale);
    this.balls.push({body,container,_scale:scale});
    return body;
  }

  _makeTexture(texKey, a) {
    const dpr=Math.min(window.devicePixelRatio||1,2), r=Math.max(4,a.r);
    const size=Math.ceil(r*2)*dpr;
    const oc=document.createElement('canvas'); oc.width=oc.height=size;
    const c=oc.getContext('2d'); c.scale(dpr,dpr);
    const cx=r, bw=Math.max(.5,Math.min(r*.09,r*.25));
    const cr=(a.color>>16)&0xff, cg=(a.color>>8)&0xff, cb=a.color&0xff;

    // base fill
    c.fillStyle=`rgb(${cr},${cg},${cb})`;
    c.beginPath(); c.arc(cx,cx,r,0,Math.PI*2); c.fill();

    // inner gradient: light top-left to dark bottom-right
    const grad=c.createRadialGradient(cx-r*.28,cx-r*.28,r*.05,cx,cx,r);
    grad.addColorStop(0,'rgba(255,255,255,.30)');
    grad.addColorStop(0.5,'rgba(255,255,255,.03)');
    grad.addColorStop(1,'rgba(0,0,0,.20)');
    c.fillStyle=grad;
    c.beginPath(); c.arc(cx,cx,r,0,Math.PI*2); c.fill();

    // specular highlight
    const spec=c.createRadialGradient(cx-r*.28,cx-r*.30,0,cx-r*.28,cx-r*.30,r*.40);
    spec.addColorStop(0,'rgba(255,255,255,.50)');
    spec.addColorStop(1,'rgba(255,255,255,0)');
    c.fillStyle=spec;
    c.beginPath(); c.arc(cx,cx,r,0,Math.PI*2); c.fill();

    // border drawn inside the circle so it doesn't add width outside
    const bc=_borderColor(a.color);
    c.strokeStyle=`rgba(${(bc>>16)&0xff},${(bc>>8)&0xff},${bc&0xff},.72)`;
    c.lineWidth=bw*2; c.beginPath(); c.arc(cx,cx,r-bw*.5,0,Math.PI*2);
    c.save(); c.clip(); c.stroke(); c.restore();

    this.scene.textures.addCanvas(texKey,oc);
  }

  remove(body) {
    const idx=this.balls.findIndex(b=>b.body===body); if(idx===-1) return;
    this.balls[idx].container.destroy();
    try{this.scene.matter.world.remove(body);}catch(_){}
    this.balls.splice(idx,1);
  }

  draw(delta) {
    const dt=Math.min(delta||16,50)/(1000/60);
    for (const b of this.balls) {
      if (!b.body) continue;
      b._scale=Math.min(1,b._scale+.05*dt);
      const r=ANIMALS[b.body._type].r;
      let px=b.body.position.x, py=b.body.position.y;
      if (px-r < 0)   { px=r;   this.scene.matter.body.setPosition(b.body,{x:px,y:py}); this.scene.matter.body.setVelocity(b.body,{x:0,y:b.body.velocity.y}); }
      if (px+r > W)   { px=W-r; this.scene.matter.body.setPosition(b.body,{x:px,y:py}); this.scene.matter.body.setVelocity(b.body,{x:0,y:b.body.velocity.y}); }
      if (py+r > H)   { py=H-r; this.scene.matter.body.setPosition(b.body,{x:px,y:py}); this.scene.matter.body.setVelocity(b.body,{x:b.body.velocity.x*0.5,y:0}); }
      b.container.setPosition(px,py).setScale(b._scale);
      const vx=b.body.velocity.x, vy=b.body.velocity.y;
      if (Math.abs(vx)<0.08 && Math.abs(vy)<0.08) {
        this.scene.matter.body.setVelocity(b.body,{x:0,y:0});
      }
    }
    updateMusicTempo(this.balls);
  }

  clear() {
    for (const b of this.balls) {
      b.container.destroy();
      try{this.scene.matter.world.remove(b.body);}catch(_){}
    }
    this.balls=[];
    for (let t=0;t<10;t++){const k=`ball_${t}`;if(this.scene.textures.exists(k))this.scene.textures.remove(k);}
  }

  refreshVisuals() {
    for (let t=0;t<10;t++){const k=`ball_${t}`;if(this.scene.textures.exists(k))this.scene.textures.remove(k);}
    for (const b of this.balls) {
      if (!b.body) continue;
      const type=b.body._type, a=ANIMALS[Math.min(type,ANIMALS.length-1)];
      const texKey=`ball_${type}`;
      if (!this.scene.textures.exists(texKey)) this._makeTexture(texKey,a);
      const [sprite,label]=b.container.list;
      sprite?.setTexture(texKey).setDisplaySize(a.r*2,a.r*2);
      label?.setText(a.emoji).setFontSize(Math.floor(a.r*1.4)+'px');
    }
  }

  checkDangerState() {
    const now=Date.now();
    if (this._lastMergeTime && now-this._lastMergeTime<600) return 'clear';
    let danger=false;
    for (const b of this.balls) {
      if (!b.body || now-b.body._spawnTime<800) continue;
      if (Math.hypot(b.body.velocity.x,b.body.velocity.y)>1.5) continue;
      if (b.body.position.y-ANIMALS[b.body._type].r<GAME_OVER_LINE){danger=true;break;}
    }
    if (!danger) { this._dangerSince=null; return 'clear'; }
    if (!this._dangerSince) this._dangerSince=now;
    return now-this._dangerSince<3000?'warning':'gameover';
  }

  resetDanger() { this._dangerSince=null; this._lastMergeTime=Date.now(); }
  dangerSecsLeft() { return this._dangerSince?Math.max(0,4-(Date.now()-this._dangerSince)/1000):4; }
}

class EffectsManager {
  constructor(scene) { this.scene=scene; }

  spawnMerge(x,y,level) {
    const a=ANIMALS[Math.min(level,ANIMALS.length-1)];
    const em=this.scene.add.particles(x,y,'__DEFAULT',{
      speed:{min:(70+level*15)*SCALE_FACTOR,max:(180+level*25)*SCALE_FACTOR},
      angle:{min:0,max:360},scale:{start:(.7+level*.07)*SCALE_FACTOR,end:0},
      alpha:{start:1,end:0},lifespan:380+level*25,quantity:14+level*2,
      tint:[a.color,0xffffff,0xffffcc],emitting:false,depth:5,
    });
    em.explode(14+level*2);
    this.scene.time.delayedCall(700,()=>{if(em.active)em.destroy();});
    const ring=this.scene.add.graphics().setDepth(5);
    ring.lineStyle(3*SCALE_FACTOR,a.color,.95).strokeCircle(0,0,12*SCALE_FACTOR).setPosition(x,y);
    this.scene.tweens.add({targets:ring,scaleX:4.5+level*.55,scaleY:4.5+level*.55,alpha:0,duration:340+level*18,ease:'Quad.easeOut',onComplete:()=>ring.destroy()});
    this.scene.cameras.main.shake(100+level*12,.004+level*.0008);
    playMergeSound(level); vibrate(15+level*5);
  }

  spawnGameOverFX() {
    const em=this.scene.add.particles(W/2,H/2,'__DEFAULT',{
      speed:{min:100*SCALE_FACTOR,max:220*SCALE_FACTOR},angle:{min:0,max:360},
      scale:{start:1.2*SCALE_FACTOR,end:0},alpha:{start:1,end:0},lifespan:900,quantity:50,
      tint:[0xff4444,0xff8800,0xffff00,0xffffff],emitting:false,depth:20,
    });
    em.explode(50); this.scene.time.delayedCall(1100,()=>{if(em.active)em.destroy();});
    vibrate([100,50,100]);
  }

  spawnWinFX() {
    const conf=this.scene.add.particles(W/2,0,'__DEFAULT',{
      speedX:{min:-120*SCALE_FACTOR,max:120*SCALE_FACTOR},speedY:{min:80*SCALE_FACTOR,max:260*SCALE_FACTOR},
      scale:{start:.9*SCALE_FACTOR,end:.2*SCALE_FACTOR},alpha:{start:1,end:0},lifespan:1800,quantity:4,
      tint:[0xffd700,0xff69b4,0x00cfff,0x7fff00,0xff8c00,0xda70d6],depth:20,gravityY:60*SCALE_FACTOR,
    });
    this.scene.time.delayedCall(2500,()=>{conf.stop();this.scene.time.delayedCall(2000,()=>{if(conf.active)conf.destroy();});});
    const burst=this.scene.add.particles(W/2,H/2,'__DEFAULT',{
      speed:{min:120*SCALE_FACTOR,max:300*SCALE_FACTOR},angle:{min:0,max:360},
      scale:{start:1.4*SCALE_FACTOR,end:0},alpha:{start:1,end:0},lifespan:1000,quantity:60,
      tint:[0xffd700,0xffffff,0xff69b4,0x00cfff],emitting:false,depth:20,
    });
    burst.explode(60); this.scene.time.delayedCall(1200,()=>{if(burst.active)burst.destroy();});
    this.scene.cameras.main.shake(600,.012); vibrate([200,100,200,100,200]);
  }
}

class GameScene extends Phaser.Scene {
  constructor(){super({key:'GameScene'});}

  create() {
    activeScene=this;
    this.score=0; this.gameOver=false; this.canDrop=true;
    this.mouseX=W/2; this.currentType=randNext(); this.nextType=randNext();
    this.gameOverShown=false; this.overlayContainer=null;
    this._bgTime=0; this._bgSky0=_gbcSky0; this._bgSky1=_gbcSky1;
    this._warningActive=false; this._lastWarnShake=0;
    drawPreview(this.nextType); updateScore(0);

    this.matter.world.setGravity(0,1.4);
    const WALL=120;
    const wOpts={isStatic:true,friction:.35,frictionStatic:.5,restitution:.02,slop:0,label:'wall'};
    this.matter.add.rectangle(W/2,H+WALL/2-2,W+WALL*2,WALL,{...wOpts,friction:.45,frictionStatic:.6});
    this.matter.add.rectangle(-WALL/2,H/2,WALL,H*3,wOpts);
    this.matter.add.rectangle(W+WALL/2,H/2,WALL,H*3,wOpts);

    this.cameras.main.setBackgroundColor('rgba(0,0,0,0)');
    this.ballMgr=new BallManager(this);
    this.effects=new EffectsManager(this);
    this.guideGfx=this.add.graphics().setDepth(2);
    this.lineGfx=this.add.graphics().setDepth(2);
    this.previewGfx=this.add.graphics().setDepth(3);
    this.previewLabel=this.add.text(W/2,GAME_OVER_LINE,'',{fontFamily:'serif',fontSize:Math.floor(28*SCALE_FACTOR)+'px'}).setOrigin(.5,.5).setDepth(4);
    this._countdownText=this.add.text(W/2,GAME_OVER_LINE+14*SCALE_FACTOR,'',{fontFamily:'system-ui',fontSize:Math.floor(15*SCALE_FACTOR)+'px',fontStyle:'bold',color:'#ff6666'}).setOrigin(.5,0).setDepth(13).setAlpha(0);

    this._initInput();
    this._initCollisions();
    startBgMusic();
    setTimeout(()=>{
      document.getElementById('game-wrapper').style.display='flex';
      const ls=document.getElementById('loading-screen');
      ls.style.display='flex';
      // kurz warten damit display:flex greift, dann fade-out
      requestAnimationFrame(()=>{
        requestAnimationFrame(()=>{
          ls.classList.add('hidden');
          setTimeout(()=>{ ls.style.display='none'; ls.classList.remove('hidden'); },550);
        });
      });
      if (window._stopStartBg) window._stopStartBg();
    },500);
  }

  _initInput() {
    const canvas=this.sys.game.canvas;
    let touchActive=false;
    canvas.addEventListener('mousemove',e=>{
      if(touchActive)return;
      const r=canvas.getBoundingClientRect();
      this.mouseX=Phaser.Math.Clamp((e.clientX-r.left)*(W/r.width),0,W);
    });
    canvas.addEventListener('touchmove',e=>{
      e.preventDefault(); touchActive=true;
      const r=canvas.getBoundingClientRect();
      this.mouseX=Phaser.Math.Clamp((e.touches[0].clientX-r.left)*(W/r.width),0,W);
    },{passive:false});
    canvas.addEventListener('touchstart',e=>{
      e.preventDefault(); touchActive=true;
      const r=canvas.getBoundingClientRect();
      this.mouseX=Phaser.Math.Clamp((e.touches[0].clientX-r.left)*(W/r.width),0,W);
    },{passive:false});
    canvas.addEventListener('click',()=>{if(!touchActive)this._drop();});
    canvas.addEventListener('touchend',e=>{e.preventDefault();this._drop();setTimeout(()=>touchActive=false,100);},{passive:false});
    document.getElementById('menu-restart').onclick=()=>{menuOverlay.classList.remove('open');this._reset();};
  }

  _drop() {
    if (!this.canDrop||this.gameOver) return;
    this.ballMgr.drop(this.mouseX,this.currentType);
    this.currentType=this.nextType; this.nextType=randNext();
    drawPreview(this.nextType); this.canDrop=false;
    this.time.delayedCall(480,()=>{this.canDrop=true;});
  }

  _initCollisions() {
    this.matter.world.on('collisionstart',event=>{
      event.pairs.forEach(({bodyA,bodyB})=>{
        if (bodyA._type==null||bodyB._type==null) return;
        if (bodyA._type!==bodyB._type||bodyA._merged||bodyB._merged) return;
        if (bodyA._type>=ANIMALS.length-1) return;
        bodyA._merged=bodyB._merged=true;
        const nt=bodyA._type+1;
        const mx=(bodyA.position.x+bodyB.position.x)/2, my=(bodyA.position.y+bodyB.position.y)/2;
        const vx=(bodyA.velocity.x+bodyB.velocity.x)*.25, vy=(bodyA.velocity.y+bodyB.velocity.y)*.25;
        this.time.delayedCall(20,()=>{
          this.ballMgr.resetDanger();
          this.effects.spawnMerge(mx,my,nt);
          this.ballMgr.remove(bodyA); this.ballMgr.remove(bodyB);
          const nb=this.ballMgr.spawn(mx,my,nt);
          // Sanfte Anfangsgeschwindigkeit nach Merge, nach unten gerichtet
          const mvx = (bodyA.velocity.x+bodyB.velocity.x)*0.15;
          const mvy = Math.max((bodyA.velocity.y+bodyB.velocity.y)*0.15, 1.5);
          this.matter.body.setVelocity(nb,{x:mvx, y:mvy});
          this.score+=(nt+1)*2; updateScore(this.score);
          flashMergeCell(nt);
          if (nt===ANIMALS.length-1) this.time.delayedCall(400,()=>this._showWin());
        });
      });
    });
  }

  _reset() {
    stopBgMusic(); resetBgMusic(); this.ballMgr.clear();
    if (this.overlayContainer){this.overlayContainer.destroy();this.overlayContainer=null;}
    this.score=0; this.gameOver=false; this.canDrop=true; this.gameOverShown=false;
    this._lastMergeTime=0; this._warningActive=false; this._lastWarnShake=0;
    this._countdownText.setAlpha(0).setText('');
    this.currentType=randNext(); this.nextType=randNext();
    drawPreview(this.nextType); updateScore(0);
    _dayCycleStart=Date.now()-0.50*DAY_CYCLE_SECONDS*1000;
    startBgMusic();
  }

  _dashedLine(gfx,x1,y1,x2,y2,dash,gap) {
    const dx=x2-x1,dy=y2-y1,len=Math.hypot(dx,dy),nx=dx/len,ny=dy/len;
    let pos=0,on=true;
    while(pos<len){const seg=Math.min(on?dash:gap,len-pos);if(on){gfx.beginPath();gfx.moveTo(x1+nx*pos,y1+ny*pos);gfx.lineTo(x1+nx*(pos+seg),y1+ny*(pos+seg));gfx.strokePath();}pos+=seg;on=!on;}
  }

  update(time,delta) {
    // Kamera transparent halten
    this.cameras.main.setBackgroundColor('rgba(0,0,0,0)');

    // Guide-Linie
    this.guideGfx.clear();
    if (!this.gameOver) {
      const a=ANIMALS[this.currentType], x=Phaser.Math.Clamp(this.mouseX,a.r+1,W-a.r-1);
      this.guideGfx.lineStyle(1*SCALE_FACTOR,0xffffff,.18);
      this._dashedLine(this.guideGfx,x,GAME_OVER_LINE,x,H,6*SCALE_FACTOR,5*SCALE_FACTOR);
    }

    // Gefahrenlinie
    this.lineGfx.clear();
    if (this._warningActive) {
      const pulse=.5+.5*Math.sin(Date.now()/180);
      this.lineGfx.lineStyle(6*SCALE_FACTOR,0xff0000,.18+pulse*.18);
      this._dashedLine(this.lineGfx,0,GAME_OVER_LINE,W,GAME_OVER_LINE,10*SCALE_FACTOR,6*SCALE_FACTOR);
      this.lineGfx.lineStyle(2*SCALE_FACTOR,0xff2222,.6+pulse*.4);
    } else {
      this.lineGfx.lineStyle(2*SCALE_FACTOR,0xff4444,.7);
    }
    this._dashedLine(this.lineGfx,0,GAME_OVER_LINE,W,GAME_OVER_LINE,10*SCALE_FACTOR,6*SCALE_FACTOR);

    // Preview-Ball
    this.previewGfx.clear();
    if (!this.gameOver) {
      const a=ANIMALS[this.currentType], x=Phaser.Math.Clamp(this.mouseX,a.r+1,W-a.r-1), y=GAME_OVER_LINE-a.r;
      this.previewGfx.fillStyle(a.color,.92).fillCircle(x,y,a.r);
      const bw=Math.max(2,a.r*.09);
      this.previewGfx.lineStyle(bw,_borderColor(a.color),.85).strokeCircle(x,y,a.r-bw*.5);
      this.previewLabel.setVisible(true).setPosition(x,y+2).setText(a.emoji).setFontSize(Math.floor(a.r*1.4));
    } else { this.previewLabel.setVisible(false); }

    this.ballMgr.draw(delta);
    if (this.gameOver) return;

    const danger=this.ballMgr.checkDangerState();
    if (danger==='gameover') { this.gameOver=true; this.canDrop=false; this._countdownText.setAlpha(0).setText(''); this._showGameOver(); return; }
    if (danger==='warning') {
      const sec=this.ballMgr.dangerSecsLeft();
      this._countdownText.setText(`⚠️  Noch ${Math.ceil(sec)} s – merge jetzt!`).setAlpha(.55+(1-sec/4)*.45);
      this._warningActive=true;
      if (!this._lastWarnShake||time-this._lastWarnShake>900){this.cameras.main.shake(180,.003);this._lastWarnShake=time;}
    } else {
      if(this._warningActive){this._countdownText.setAlpha(0).setText('');this._warningActive=false;}
    }
  }

  _overlay(title,scoreText,btnLabel,btnColor,onBtn,extraFn) {
    if (this.gameOverShown) return; this.gameOverShown=true;
    const ov=this.add.graphics().setDepth(15); ov.fillStyle(0x000000,.55).fillRect(0,0,W,H);
    const pw=300*SCALE_FACTOR,ph=220*SCALE_FACTOR,px=W/2-pw/2,py=H/2-ph/2;
    const panel=this.add.graphics().setDepth(16);
    panel.fillStyle(0x0d1117,.97).fillRoundedRect(px,py,pw,ph,18*SCALE_FACTOR);
    panel.lineStyle(1*SCALE_FACTOR,0xffffff,.14).strokeRoundedRect(px,py,pw,ph,18*SCALE_FACTOR);
    const items=[ov,panel];
    if (extraFn) extraFn(items);
    const t=this.add.text(W/2,H/2-36*SCALE_FACTOR,title,{fontSize:Math.floor(28*SCALE_FACTOR)+'px',fontFamily:'system-ui',color:'#ffffff',fontStyle:'bold'}).setOrigin(.5,.5).setDepth(17);
    const sc=this.add.text(W/2,H/2+4*SCALE_FACTOR,scoreText,{fontSize:Math.floor(18*SCALE_FACTOR)+'px',fontFamily:'system-ui',color:'#ffd700'}).setOrigin(.5,.5).setDepth(17);
    const bw=180*SCALE_FACTOR,bh=44*SCALE_FACTOR,bg=this.add.graphics().setDepth(17);
    bg.fillStyle(btnColor,1).fillRoundedRect(W/2-bw/2,H/2+55*SCALE_FACTOR-bh/2,bw,bh,12*SCALE_FACTOR);
    const btn=this.add.text(W/2,H/2+55*SCALE_FACTOR,btnLabel,{fontSize:Math.floor(17*SCALE_FACTOR)+'px',fontFamily:'system-ui',color:'#ffffff',fontStyle:'bold'}).setOrigin(.5,.5).setDepth(18).setInteractive({useHandCursor:true});
    btn.on('pointerup',onBtn);
    items.push(t,sc,bg,btn);
    this.overlayContainer=this.add.container(0,0,items).setDepth(15).setAlpha(0);
    this.tweens.add({targets:this.overlayContainer,alpha:1,duration:380,ease:'Quad.easeIn'});
  }

  _showGameOver() { this.effects.spawnGameOverFX(); this._overlay('Spiel vorbei',`Punkte: ${this.score}`,'🔄 Neu starten',0x27ae60,()=>this._reset()); }

  _showWin() {
    if (this.gameOverShown) return;
    this.gameOver=true; this.canDrop=false;
    stopBgMusic(); playFanfare(); this.effects.spawnWinFX();
    this.time.delayedCall(1200,()=>{
      playElephantSound();
      const winEmoji=ANIMALS[ANIMALS.length-1].emoji;
      this._overlay('Du hast gewonnen!',`Punkte: ${this.score}`,'🔄 Neu starten',0xffd700,()=>this._reset(),(items)=>{
        // Panel goldenen Rahmen
        const pw=300*SCALE_FACTOR,ph=220*SCALE_FACTOR,px=W/2-pw/2,py=H/2-ph/2;
        items[1].lineStyle(3*SCALE_FACTOR,0xffd700,.9).strokeRoundedRect(px,py,pw,ph,18*SCALE_FACTOR);
        const em=this.add.text(W/2,H/2-70*SCALE_FACTOR,winEmoji,{fontSize:Math.floor(50*SCALE_FACTOR)+'px'}).setOrigin(.5,.5).setDepth(17);
        items.push(em);
        this.time.delayedCall(900,()=>{
          this.tweens.add({targets:em,y:H/2-80*SCALE_FACTOR,duration:350,yoyo:true,repeat:-1,ease:'Sine.easeInOut'});
        });
      });
    });
  }
}

// ── Start-Screen-Animation ───────────────────────────────────────────────────
function startGameAfterUserTap() {
  if (gameStarted) return;
  gameStarted=true;
  try{const c=getAudioCtx(),e=c.createBuffer(1,1,22050),s=c.createBufferSource();s.buffer=e;s.connect(c.destination);s.start(0);}catch(_){}
  document.getElementById('start-screen').style.display='none';
  startGameBgCanvas();
  const ls=document.getElementById('loading-screen');
  const le=ls.querySelector('.loading-emoji');
  if(le)le.textContent=EMOJI_CATEGORIES[activeCategory].emojis[9];
  ls.style.display='flex';
  initMergeBar();

  new Phaser.Game({
    type:Phaser.CANVAS,width:W,height:H,
    resolution:Math.min(window.devicePixelRatio||1,2),
    pixelArt:false,roundPixels:true,
    backgroundColor:0x00000000,transparent:true,
    parent:'phaser-container',
    fps:{target:60,forceSetTimeOut:false,smoothStep:true},
    physics:{default:'matter',matter:{gravity:{y:2.0},debug:false,enableSleeping:true,positionIterations:20,velocityIterations:16,constraintIterations:4,sleepThreshold:120}},
    scene:[GameScene],
  });
}

window.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('version-display').textContent=`Version ${VERSION}`;

  // Einziger Hintergrund-Canvas – läuft durchgehend für Startmenü und Spiel
  _resizeGbc();
  window.addEventListener('resize',_resizeGbc);
  _gbcRunning=true;
  _gbcFrame=requestAnimationFrame(_drawGbc);
  window._stopStartBg=()=>{}; // kein separates System mehr nötig

  buildCatGrid('start-cat-grid',key=>{
    activeCategory=key; ANIMALS.length=0; getAnimals(key).forEach(a=>ANIMALS.push(a));
    refreshCatGrids();
    const icon=document.getElementById('start-icon');
    if(icon)icon.textContent=EMOJI_CATEGORIES[key].emojis[9];
  });
  buildCatGrid('menu-cat-grid',key=>{applyCategory(key,activeScene);menuOverlay.classList.remove('open');});

  const sb=document.getElementById('start-btn');
  sb.addEventListener('click',startGameAfterUserTap);
  sb.addEventListener('touchend',e=>{e.preventDefault();startGameAfterUserTap();});
});
</script>
